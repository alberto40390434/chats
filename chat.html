<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff;--bg2:#f7f7f5;--bg3:#efefec;--sidebar-bg:#f2f1ee;
    --text:#111;--text2:#666;--text3:#999;--border:#e4e3de;
    --accent:#2563eb;--accent-light:#eff4ff;
    --bubble-out:#2563eb;--bubble-out-text:#fff;
    --bubble-in:#efefec;--bubble-in-text:#111;
    --font:'DM Sans',sans-serif;--radius:14px;--input-bg:#f2f1ee;
  }
  [data-theme="dark"]{--bg:#1a1a1a;--bg2:#222;--bg3:#2a2a2a;--sidebar-bg:#141414;--text:#f0efe9;--text2:#aaa;--text3:#666;--border:#333;--accent:#4f8ef5;--accent-light:#1a2540;--bubble-out:#4f8ef5;--bubble-out-text:#fff;--bubble-in:#2a2a2a;--bubble-in-text:#f0efe9;--input-bg:#2a2a2a;}
  [data-theme="discord"]{--bg:#313338;--bg2:#2b2d31;--bg3:#232428;--sidebar-bg:#2b2d31;--text:#dbdee1;--text2:#949ba4;--text3:#6d6f78;--border:#3a3c40;--accent:#5865f2;--accent-light:#2c2e45;--bubble-out:#5865f2;--bubble-out-text:#fff;--bubble-in:#383a40;--bubble-in-text:#dbdee1;--input-bg:#383a40;}
  [data-theme="gamer"]{--bg:#0d0d0d;--bg2:#111;--bg3:#161616;--sidebar-bg:#0a0a0a;--text:#e0ffe0;--text2:#7aab7a;--text3:#3d6b3d;--border:#1a2a1a;--accent:#00ff88;--accent-light:#001a0d;--bubble-out:#00ff88;--bubble-out-text:#000;--bubble-in:#161616;--bubble-in-text:#e0ffe0;--input-bg:#111;}

  body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;font-size:14px;transition:background .2s,color .2s}
  .app{display:flex;height:100vh;overflow:hidden}
  .sidebar{width:220px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
  .sidebar-header{padding:16px 14px 12px;border-bottom:1px solid var(--border)}
  .sidebar-header h2{font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text2)}
  .channel-list{flex:1;overflow-y:auto;padding:8px 0}
  .channel{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:6px;margin:1px 6px;cursor:pointer;color:var(--text2);font-size:13.5px;transition:background .12s,color .12s;user-select:none}
  .channel:hover{background:var(--bg3);color:var(--text)}
  .channel.active{background:var(--accent-light);color:var(--accent);font-weight:500}
  .unread-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:99px;min-width:18px;text-align:center}
  .sidebar-footer{padding:10px;border-top:1px solid var(--border)}
  .user-row{display:flex;align-items:center;gap:8px}
  .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
  .username{font-size:13px;font-weight:500;color:var(--text)}
  .user-status{font-size:11px;color:var(--text3)}
  .settings-btn{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:4px;border-radius:6px;transition:background .12s}
  .settings-btn:hover{background:var(--bg3);color:var(--text)}
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .chat-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg);flex-shrink:0}
  .chat-header-name{font-weight:600;font-size:15px}
  .chat-header-desc{font-size:12px;color:var(--text3);margin-left:auto}
  .online-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:4px}
  .messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:3px;background:var(--bg)}
  .messages::-webkit-scrollbar{width:4px}
  .messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  .day-divider{display:flex;align-items:center;gap:10px;margin:10px 0;color:var(--text3);font-size:11px}
  .day-divider::before,.day-divider::after{content:'';flex:1;height:1px;background:var(--border)}
  .msg-group{display:flex;flex-direction:column;gap:2px;margin:4px 0}
  .msg-row{display:flex;align-items:flex-end;gap:8px}
  .msg-row.out{flex-direction:row-reverse}
  .msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;margin-bottom:2px}
  .msg-row.continuation .msg-avatar{visibility:hidden}
  .msg-content{display:flex;flex-direction:column;max-width:72%}
  .msg-row.out .msg-content{align-items:flex-end}
  .msg-sender{font-size:11px;color:var(--text3);margin-bottom:2px;padding-left:2px}
  .bubble{padding:9px 13px;border-radius:var(--radius);font-size:13.5px;line-height:1.5;word-break:break-word;position:relative}
  .bubble.in{background:var(--bubble-in);color:var(--bubble-in-text);border-bottom-left-radius:4px}
  .bubble.out{background:var(--bubble-out);color:var(--bubble-out-text);border-bottom-right-radius:4px}
  .msg-row.continuation .bubble.in{border-top-left-radius:4px}
  .msg-row.continuation .bubble.out{border-top-right-radius:4px}
  .msg-meta{display:flex;align-items:center;gap:6px;margin-top:2px;padding:0 2px}
  .msg-time{font-size:10.5px;color:var(--text3)}
  .reactions{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
  .reaction{background:var(--bg3);border:1px solid var(--border);border-radius:99px;padding:2px 7px;font-size:12px;cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:3px;color:var(--text2)}
  .reaction:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
  .reaction.mine{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
  .reaction-count{font-size:11px;font-weight:500}
  .msg-hover-actions{display:none;position:absolute;top:-30px;right:6px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:3px 4px;gap:2px;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:10}
  .bubble:hover .msg-hover-actions{display:flex}
  .hover-action{background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:5px;font-size:14px;transition:background .1s}
  .hover-action:hover{background:var(--bg3)}
  .input-area{padding:12px 16px;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0}
  .input-row{display:flex;align-items:flex-end;gap:8px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius);padding:6px 8px;transition:border-color .15s}
  .input-row:focus-within{border-color:var(--accent)}
  .icon-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px 6px;border-radius:6px;font-size:16px;transition:color .12s,background .12s}
  .icon-btn:hover{color:var(--accent);background:var(--accent-light)}
  .chat-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:13.5px;resize:none;min-height:22px;max-height:120px;line-height:1.5;padding:2px 4px}
  .chat-input::placeholder{color:var(--text3)}
  .send-btn{background:var(--accent);border:none;cursor:pointer;color:#fff;padding:6px 14px;border-radius:9px;font-size:13.5px;transition:opacity .12s;flex-shrink:0;font-family:var(--font);font-weight:500}
  .send-btn:hover{opacity:.85}
  .emoji-picker{position:absolute;bottom:calc(100% + 8px);left:0;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px;display:flex;gap:6px;flex-wrap:wrap;width:200px;box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:100}
  .ep-emoji{font-size:20px;cursor:pointer;padding:4px;border-radius:6px;transition:background .1s}
  .ep-emoji:hover{background:var(--bg3)}
  .members-panel{width:180px;border-left:1px solid var(--border);background:var(--sidebar-bg);overflow-y:auto;flex-shrink:0;padding:12px 0}
  .members-panel h3{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:0 12px 8px}
  .member-row{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:6px;margin:1px 4px;cursor:pointer;transition:background .1s}
  .member-row:hover{background:var(--bg3)}
  .member-name{font-size:13px;color:var(--text2)}
  .member-status{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-left:auto}
  .status-online{background:#22c55e}
  .status-away{background:#f59e0b}
  .status-offline{background:var(--border)}
  .typing-indicator{display:flex;align-items:center;gap:6px;padding:4px 2px;min-height:20px;font-size:12px;color:var(--text3)}
  .typing-dots{display:flex;gap:3px}
  .typing-dot{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:bounce 1.2s ease-in-out infinite}
  .typing-dot:nth-child(2){animation-delay:.2s}
  .typing-dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity .15s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--bg);border-radius:16px;border:1px solid var(--border);padding:24px;width:320px;transform:translateY(8px);transition:transform .15s}
  .modal-overlay.open .modal{transform:translateY(0)}
  .modal h2{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--text)}
  .setting-group{margin-bottom:16px}
  .setting-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;display:block}
  .theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .theme-btn{padding:8px 10px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg2);cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;color:var(--text2);transition:all .12s;text-align:left}
  .theme-btn:hover,.theme-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
  .setting-input{width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-family:var(--font);font-size:13px;outline:none}
  .color-swatches{display:flex;gap:6px;flex-wrap:wrap}
  .color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .1s}
  .close-btn{width:100%;padding:9px;background:var(--accent);border:none;border-radius:9px;color:#fff;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;margin-top:8px}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header"><h2># Channels</h2></div>
    <div class="channel-list" id="channelList"></div>
    <div class="sidebar-footer">
      <div class="user-row">
        <div class="avatar" id="myAvatar" style="background:#dbeafe;color:#1d4ed8">YO</div>
        <div>
          <div class="username" id="myNameDisplay">You</div>
          <div class="user-status"><span class="online-dot" style="width:6px;height:6px;margin-right:3px"></span>Online</div>
        </div>
        <button class="settings-btn" onclick="openSettings()" title="Settings">⚙</button>
      </div>
    </div>
  </div>
  <div class="main">
    <div class="chat-header">
      <span style="font-size:16px;color:var(--text2)">#</span>
      <span class="chat-header-name" id="chatTitle">general</span>
      <span class="chat-header-desc" id="chatDesc"><span class="online-dot"></span>5 online</span>
    </div>
    <div class="messages" id="messages"></div>
    <div style="padding:0 16px 2px"><div class="typing-indicator" id="typingIndicator"></div></div>
    <div class="input-area">
      <div class="input-row">
        <div style="position:relative">
          <button class="icon-btn" onclick="toggleEmojiPicker()" title="Emoji">😊</button>
          <div class="emoji-picker" id="emojiPicker" style="display:none"></div>
        </div>
        <textarea class="chat-input" id="chatInput" placeholder="Message #general..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
  <div class="members-panel" id="membersPanel"></div>
</div>

<div class="modal-overlay" id="settingsModal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2>⚙ Settings</h2>
    <div class="setting-group">
      <span class="setting-label">Theme</span>
      <div class="theme-grid">
        <button class="theme-btn active" onclick="setTheme('',this)">☀ Modern</button>
        <button class="theme-btn" onclick="setTheme('dark',this)">🌙 Dark</button>
        <button class="theme-btn" onclick="setTheme('discord',this)">💬 Discord</button>
        <button class="theme-btn" onclick="setTheme('gamer',this)">🎮 Gamer</button>
      </div>
    </div>
    <div class="setting-group">
      <span class="setting-label">Your nickname</span>
      <input type="text" id="nicknameInput" class="setting-input" value="You" maxlength="20" />
    </div>
    <div class="setting-group">
      <span class="setting-label">Avatar color</span>
      <div class="color-swatches" id="colorSwatches"></div>
    </div>
    <button class="close-btn" onclick="closeSettings()">Done</button>
  </div>
</div>

<script>
const channels=[
  {id:'general',label:'general',desc:'5 online',unread:0},
  {id:'random',label:'random',desc:'3 online',unread:2},
  {id:'tech',label:'tech-talk',desc:'4 online',unread:0},
  {id:'offtopic',label:'off-topic',desc:'2 online',unread:5},
];
const members=[
  {name:'Alex',initials:'AL',bg:'#dcfce7',fg:'#166534',status:'online'},
  {name:'Morgan',initials:'MO',bg:'#fce7f3',fg:'#9d174d',status:'online'},
  {name:'Sam',initials:'SA',bg:'#fef9c3',fg:'#854d0e',status:'away'},
  {name:'Jordan',initials:'JO',bg:'#f3e8ff',fg:'#6b21a8',status:'online'},
  {name:'Taylor',initials:'TA',bg:'#ffe4e6',fg:'#9f1239',status:'offline'},
];
const avatarColors=[
  {bg:'#dbeafe',fg:'#1d4ed8'},{bg:'#dcfce7',fg:'#166534'},
  {bg:'#fce7f3',fg:'#9d174d'},{bg:'#fef9c3',fg:'#854d0e'},
  {bg:'#f3e8ff',fg:'#6b21a8'},{bg:'#ffe4e6',fg:'#9f1239'},
];
const emojis=['👍','❤️','😂','😮','😢','🎉','🔥','✅','👏','🙌'];
const seedMessages={
  general:[
    {id:1,from:'Alex',text:"Hey everyone! 👋 What's up?",time:'10:12 AM',reactions:[{e:'👋',count:2,mine:false},{e:'❤️',count:1,mine:true}]},
    {id:2,from:'Morgan',text:"Not much, just testing this chat app 😄",time:'10:13 AM',reactions:[]},
    {id:3,from:'You',text:"It looks really clean! Love the design.",time:'10:14 AM',reactions:[{e:'❤️',count:3,mine:false}]},
    {id:4,from:'Sam',text:"Yeah agreed. The dark mode is 🔥",time:'10:15 AM',reactions:[]},
    {id:5,from:'Alex',text:"Try switching themes in settings ⚙",time:'10:15 AM',reactions:[]},
  ],
  random:[
    {id:1,from:'Jordan',text:"Anyone seen any good shows lately?",time:'9:40 AM',reactions:[]},
    {id:2,from:'Taylor',text:"Been watching Severance. It's incredible.",time:'9:42 AM',reactions:[{e:'🔥',count:2,mine:false}]},
  ],
  tech:[
    {id:1,from:'Morgan',text:"Anyone else excited about WebGPU?",time:'8:30 AM',reactions:[]},
    {id:2,from:'Alex',text:"Absolutely! The compute shader support is going to be huge.",time:'8:32 AM',reactions:[{e:'👍',count:1,mine:true}]},
  ],
  offtopic:[
    {id:1,from:'Sam',text:"Hot take: tabs > spaces 😤",time:'Yesterday',reactions:[{e:'😂',count:4,mine:false},{e:'😢',count:1,mine:true}]},
    {id:2,from:'Jordan',text:"I'm not even going to respond to that",time:'Yesterday',reactions:[]},
    {id:3,from:'Taylor',text:"haha the eternal debate",time:'Yesterday',reactions:[]},
  ]
};
const botReplies={
  general:["Cool! 😄","That's awesome!","Totally agree!","Ha, same here!","Nice one 👍","Interesting...","🔥🔥🔥","lol that's fair","Makes sense!"],
  random:["haha yes!","Oh definitely 😄","No way!","Same tbh","That's wild"],
  tech:["Great point!","Interesting approach!","Have you tried the new API?","Agreed, performance gains are huge","+1 to that"],
  offtopic:["haha 😂","I can't believe this conversation","We're going off the rails again","This is why I love this server 😂"],
};

let currentChannel='general',myName='You',myBg='#dbeafe',myFg='#1d4ed8';
let msgData=JSON.parse(JSON.stringify(seedMessages));
let nextId=100,emojiOpen=false,selectedColorIdx=0;

function getInitials(n){return n.slice(0,2).toUpperCase()}
function nowTime(){const d=new Date(),h=d.getHours()%12||12,m=d.getMinutes().toString().padStart(2,'0');return`${h}:${m} ${d.getHours()<12?'AM':'PM'}`}

function renderChannels(){
  document.getElementById('channelList').innerHTML=channels.map(c=>`
    <div class="channel ${c.id===currentChannel?'active':''}" onclick="switchChannel('${c.id}')">
      <span style="opacity:.7">#</span><span>${c.label}</span>
      ${c.unread>0?`<span class="unread-badge">${c.unread}</span>`:''}
    </div>`).join('');
}

function renderMembers(){
  const g={online:[],away:[],offline:[]};
  members.forEach(m=>g[m.status].push(m));
  let html='';
  if(g.online.length){html+=`<h3>Online — ${g.online.length}</h3>`;g.online.forEach(m=>html+=mRow(m));}
  if(g.away.length){html+=`<h3 style="margin-top:12px">Away</h3>`;g.away.forEach(m=>html+=mRow(m));}
  if(g.offline.length){html+=`<h3 style="margin-top:12px">Offline</h3>`;g.offline.forEach(m=>html+=mRow(m));}
  document.getElementById('membersPanel').innerHTML=html;
}
function mRow(m){return`<div class="member-row"><div class="avatar" style="width:26px;height:26px;font-size:9px;background:${m.bg};color:${m.fg}">${m.initials}</div><span class="member-name">${m.name}</span><div class="member-status status-${m.status}"></div></div>`}

function renderMessages(){
  const container=document.getElementById('messages');
  const msgs=msgData[currentChannel]||[];
  if(!msgs.length){container.innerHTML='<div style="margin:auto;text-align:center;color:var(--text3);font-size:13px;padding:40px">No messages yet. Say hi! 👋</div>';return;}
  let html=`<div class="day-divider">Today</div>`,lastFrom='';
  msgs.forEach((msg,i)=>{
    const isOut=msg.from===myName||msg.from==='You';
    const isCont=msg.from===lastFrom&&i>0;
    const mem=members.find(m=>m.name===msg.from);
    const bg=isOut?myBg:(mem?mem.bg:'#e5e7eb');
    const fg=isOut?myFg:(mem?mem.fg:'#374151');
    const rHtml=(msg.reactions&&msg.reactions.length)?`<div class="reactions">${msg.reactions.map(r=>`<button class="reaction${r.mine?' mine':''}" onclick="addReaction(${msg.id},'${r.e}')">${r.e} <span class="reaction-count">${r.count}</span></button>`).join('')}</div>`:'';
    const hActions=emojis.slice(0,5).map(e=>`<button class="hover-action" onclick="addReaction(${msg.id},'${e}')">${e}</button>`).join('');
    html+=`<div class="msg-group"><div class="msg-row ${isOut?'out':''} ${isCont?'continuation':''}">
      <div class="msg-avatar" style="background:${bg};color:${fg}">${getInitials(msg.from)}</div>
      <div class="msg-content">
        ${!isCont&&!isOut?`<div class="msg-sender">${msg.from}</div>`:''}
        <div class="bubble ${isOut?'out':'in'}">${msg.text}<div class="msg-hover-actions">${hActions}</div></div>
        ${rHtml}
        <div class="msg-meta"><span class="msg-time">${msg.time}</span></div>
      </div>
    </div></div>`;
    lastFrom=msg.from;
  });
  container.innerHTML=html;
  container.scrollTop=container.scrollHeight;
}

function addReaction(msgId,emoji){
  const msgs=msgData[currentChannel];
  const msg=msgs.find(m=>m.id===msgId);
  if(!msg)return;
  if(!msg.reactions)msg.reactions=[];
  const ex=msg.reactions.find(r=>r.e===emoji);
  if(ex){if(ex.mine){ex.count--;ex.mine=false;if(ex.count<=0)msg.reactions=msg.reactions.filter(r=>r.e!==emoji);}else{ex.count++;ex.mine=true;}}
  else{msg.reactions.push({e:emoji,count:1,mine:true});}
  renderMessages();
}

function switchChannel(id){
  currentChannel=id;
  const ch=channels.find(c=>c.id===id);
  if(ch){ch.unread=0;document.getElementById('chatTitle').textContent=ch.label;document.getElementById('chatDesc').innerHTML=`<span class="online-dot"></span>${ch.desc}`;document.getElementById('chatInput').placeholder=`Message #${ch.label}...`;}
  renderChannels();renderMessages();
}

function sendMessage(){
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text)return;
  const msgs=msgData[currentChannel]||(msgData[currentChannel]=[]);
  msgs.push({id:++nextId,from:myName,text,time:nowTime(),reactions:[]});
  input.value='';autoResize(input);renderMessages();
  setTimeout(()=>simulateReply(),1200+Math.random()*1500);
}

function simulateReply(){
  const online=members.filter(m=>m.status==='online');
  if(!online.length)return;
  const bot=online[Math.floor(Math.random()*online.length)];
  showTyping(bot.name);
  setTimeout(()=>{
    clearTyping();
    const msgs=msgData[currentChannel]||(msgData[currentChannel]=[]);
    const replies=botReplies[currentChannel]||botReplies.general;
    msgs.push({id:++nextId,from:bot.name,text:replies[Math.floor(Math.random()*replies.length)],time:nowTime(),reactions:[]});
    renderMessages();
  },1800+Math.random()*1200);
}

function showTyping(name){document.getElementById('typingIndicator').innerHTML=`<div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div><span>${name} is typing...</span>`;}
function clearTyping(){document.getElementById('typingIndicator').innerHTML='';}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

function toggleEmojiPicker(){
  emojiOpen=!emojiOpen;
  const p=document.getElementById('emojiPicker');
  if(emojiOpen){p.innerHTML=emojis.map(e=>`<span class="ep-emoji" onclick="insertEmoji('${e}')">${e}</span>`).join('');p.style.display='flex';}
  else p.style.display='none';
}
function insertEmoji(e){const i=document.getElementById('chatInput');i.value+=e;i.focus();emojiOpen=false;document.getElementById('emojiPicker').style.display='none';}
document.addEventListener('click',e=>{if(emojiOpen&&!e.target.closest('#emojiPicker')&&!e.target.closest('.icon-btn')){emojiOpen=false;document.getElementById('emojiPicker').style.display='none';}});

function openSettings(){document.getElementById('settingsModal').classList.add('open');}
function closeSettings(){
  const nn=document.getElementById('nicknameInput').value.trim();
  if(nn){myName=nn;document.getElementById('myNameDisplay').textContent=nn;}
  document.getElementById('myAvatar').textContent=getInitials(myName);
  document.getElementById('settingsModal').classList.remove('open');
  renderMessages();
}
function handleOverlayClick(e){if(e.target===e.currentTarget)closeSettings();}
function setTheme(theme,btn){document.body.setAttribute('data-theme',theme);document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function setAvatarColor(idx){
  selectedColorIdx=idx;const c=avatarColors[idx];myBg=c.bg;myFg=c.fg;
  const av=document.getElementById('myAvatar');av.style.background=myBg;av.style.color=myFg;
  renderColorSwatches();renderMessages();
}
function renderColorSwatches(){
  document.getElementById('colorSwatches').innerHTML=avatarColors.map((c,i)=>`<div class="color-swatch" style="background:${c.bg};border-color:${i===selectedColorIdx?c.fg:'transparent'}" onclick="setAvatarColor(${i})"></div>`).join('');
}

renderChannels();renderMembers();renderMessages();renderColorSwatches();
</script>
</body>
</html>
