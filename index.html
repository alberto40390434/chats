<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat App</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@daily-co/daily-js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafaf9;--bg2:#f5f4f1;--bg3:#eeedea;--sidebar-bg:#f0efe9;
  --text:#18181b;--text2:#71717a;--text3:#a1a1aa;
  --border:#e4e4e7;--border-subtle:#efefef;
  --accent:#6366f1;--accent-hover:#4f46e5;--accent-light:#eef2ff;
  --bubble-out:#6366f1;--bubble-out-text:#fff;
  --bubble-in:#ededea;--bubble-in-text:#18181b;
  --font:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;
  --radius:16px;--radius-sm:10px;--input-bg:#f0efe9;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --shadow-md:0 4px 24px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.04);
  --sidebar-w:232px;
}
[data-theme="dark"]{
  --bg:#111113;--bg2:#18181b;--bg3:#1f1f23;--sidebar-bg:#0e0e10;
  --text:#fafafa;--text2:#a1a1aa;--text3:#52525b;
  --border:#27272a;--border-subtle:#1f1f23;
  --accent:#818cf8;--accent-hover:#6366f1;--accent-light:#1e1b4b;
  --bubble-out:#6366f1;--bubble-out-text:#fff;
  --bubble-in:#27272a;--bubble-in-text:#fafafa;--input-bg:#27272a;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);
}
[data-theme="discord"]{
  --bg:#313338;--bg2:#2b2d31;--bg3:#232428;--sidebar-bg:#1e1f22;
  --text:#dbdee1;--text2:#949ba4;--text3:#6d6f78;
  --border:#3a3c40;--accent:#5865f2;--accent-hover:#4752c4;--accent-light:#2c2e45;
  --bubble-out:#5865f2;--bubble-out-text:#fff;--bubble-in:#383a40;--bubble-in-text:#dbdee1;--input-bg:#383a40;
}
[data-theme="gamer"]{
  --bg:#050507;--bg2:#0d0d10;--bg3:#111115;--sidebar-bg:#080809;
  --text:#e8ffe4;--text2:#6aaa6a;--text3:#2d5c2d;
  --border:#0f2010;--accent:#00e676;--accent-hover:#00c853;--accent-light:#001a0a;
  --bubble-out:#00e676;--bubble-out-text:#000;--bubble-in:#111115;--bubble-in-text:#e8ffe4;--input-bg:#0d0d10;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;font-size:14px;transition:background .25s,color .25s;-webkit-font-smoothing:antialiased}
.app{display:flex;height:100vh;overflow:hidden}

/* ── LOGIN ── */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
.login-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 60% 40%,rgba(99,102,241,.08) 0%,transparent 70%);pointer-events:none}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:36px 32px;width:320px;display:flex;flex-direction:column;gap:16px;box-shadow:var(--shadow-md);position:relative}
.login-box h2{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.login-box p{font-size:13px;color:var(--text2);line-height:1.5}
.login-input{padding:11px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;outline:none;width:100%;transition:border-color .15s,box-shadow .15s;font-weight:500}
.login-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.login-btn{padding:11px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;width:100%;transition:background .15s,transform .1s,box-shadow .15s;letter-spacing:-.1px}
.login-btn:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,102,241,.3)}
.login-btn:active{transform:translateY(0)}
.remember-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);cursor:pointer}
.remember-row input{accent-color:var(--accent);width:15px;height:15px;cursor:pointer}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:left .22s}
.sidebar-header{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.sidebar-header h2{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)}
.channel-list{flex:1;overflow-y:auto;padding:10px 8px}
.channel{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;margin:1px 0;cursor:pointer;color:var(--text3);font-size:13px;font-weight:500;transition:background .12s,color .12s;user-select:none}
.channel:hover{background:var(--bg3);color:var(--text2)}
.channel.active{background:var(--accent-light);color:var(--accent);font-weight:600}
.channel-hash{font-size:15px;opacity:.6;flex-shrink:0}
.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:9px}
.avatar{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;letter-spacing:.5px}
.username{font-size:13px;font-weight:600;color:var(--text)}
.user-status{font-size:11px;color:var(--text3);margin-top:1px}
.settings-btn{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:5px;border-radius:7px;transition:background .12s,color .12s;line-height:1}
.settings-btn:hover{background:var(--bg3);color:var(--text)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg);flex-shrink:0}
.chat-header-name{font-weight:700;font-size:15px;letter-spacing:-.2px}
.online-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:4px;box-shadow:0 0 0 2px rgba(34,197,94,.2)}
.messages{flex:1;overflow-y:auto;padding:20px 20px 8px;display:flex;flex-direction:column;gap:2px;background:var(--bg)}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.msg-group{display:flex;flex-direction:column;gap:2px;margin:3px 0;animation:msgIn .18s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-row{display:flex;align-items:flex-end;gap:9px}
.msg-row.out{flex-direction:row-reverse}
.msg-avatar{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-bottom:2px;letter-spacing:.5px}
.msg-row.continuation .msg-avatar{visibility:hidden}
.msg-content{display:flex;flex-direction:column;max-width:68%}
.msg-row.out .msg-content{align-items:flex-end}
.msg-sender{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:3px;padding-left:3px;letter-spacing:.02em}
.bubble{padding:9px 14px;border-radius:var(--radius);font-size:13.5px;line-height:1.55;word-break:break-word;font-weight:400}
.bubble.in{background:var(--bubble-in);color:var(--bubble-in-text);border-bottom-left-radius:5px}
.bubble.out{background:var(--bubble-out);color:var(--bubble-out-text);border-bottom-right-radius:5px}
.msg-row.continuation .bubble.in{border-top-left-radius:5px}
.msg-row.continuation .bubble.out{border-top-right-radius:5px}
.msg-meta{display:flex;align-items:center;gap:5px;margin-top:3px;padding:0 3px}
.msg-time{font-size:10px;color:var(--text3);font-variant-numeric:tabular-nums}

/* ── INPUT ── */
.input-area{padding:12px 16px 16px;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0}
.input-row{display:flex;align-items:flex-end;gap:8px;background:var(--input-bg);border:1.5px solid var(--border);border-radius:14px;padding:7px 8px;transition:border-color .15s,box-shadow .15s}
.input-row:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px 6px;border-radius:7px;font-size:17px;transition:color .12s,background .12s;position:relative;line-height:1}
.icon-btn:hover{color:var(--accent);background:var(--accent-light)}
.chat-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:13.5px;resize:none;min-height:22px;max-height:120px;line-height:1.5;padding:3px 4px;font-weight:400}
.chat-input::placeholder{color:var(--text3)}
.send-btn{background:var(--accent);border:none;cursor:pointer;color:#fff;padding:7px 16px;border-radius:10px;font-size:13px;font-weight:600;transition:background .15s,transform .1s;flex-shrink:0;font-family:var(--font);letter-spacing:-.1px}
.send-btn:hover{background:var(--accent-hover);transform:translateY(-1px)}
.send-btn:active{transform:translateY(0)}
.emoji-picker{position:absolute;bottom:calc(100% + 8px);left:0;background:var(--bg);border:1.5px solid var(--border);border-radius:14px;padding:10px;display:flex;gap:6px;flex-wrap:wrap;width:204px;box-shadow:var(--shadow-md);z-index:100}
.ep-emoji{font-size:20px;cursor:pointer;padding:4px;border-radius:7px;transition:background .1s}
.ep-emoji:hover{background:var(--bg3)}

/* ── MEMBERS ── */
.members-panel{width:176px;border-left:1px solid var(--border);background:var(--sidebar-bg);overflow-y:auto;flex-shrink:0;padding:16px 0}
.members-panel h3{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:0 14px 10px}
.member-row{display:flex;align-items:center;gap:9px;padding:6px 14px;border-radius:7px;margin:1px 4px;transition:background .1s;cursor:default}
.member-row:hover{background:var(--bg3)}
.member-name{font-size:12.5px;color:var(--text2);font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.member-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0;box-shadow:0 0 0 2px rgba(34,197,94,.15)}

/* ── TYPING ── */
.typing-indicator{display:flex;align-items:center;gap:7px;padding:4px 2px;min-height:22px;font-size:11.5px;color:var(--text3);font-weight:500}
.typing-dots{display:flex;gap:3px}
.typing-dot{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:bounce 1.2s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity .18s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg);border-radius:20px;border:1px solid var(--border);padding:28px;width:328px;transform:translateY(10px) scale(.98);transition:transform .18s;box-shadow:var(--shadow-md)}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}
.modal h2{font-size:17px;font-weight:700;margin-bottom:20px;color:var(--text);letter-spacing:-.3px}
.setting-group{margin-bottom:18px}
.setting-label{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:9px;text-transform:uppercase;letter-spacing:.08em;display:block}
.theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.theme-btn{padding:9px 10px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg2);cursor:pointer;font-family:var(--font);font-size:12.5px;font-weight:600;color:var(--text2);transition:all .14s;text-align:left}
.theme-btn:hover,.theme-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.color-swatches{display:flex;gap:7px;flex-wrap:wrap}
.color-swatch{width:27px;height:27px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:border-color .1s,transform .1s}
.color-swatch:hover{transform:scale(1.1)}
.close-btn{width:100%;padding:10px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:var(--font);font-size:13.5px;font-weight:600;cursor:pointer;margin-top:10px;transition:background .14s}
.close-btn:hover{background:var(--accent-hover)}
.logout-btn{width:100%;padding:10px;background:none;border:1.5px solid var(--border);border-radius:10px;color:var(--text2);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;margin-top:7px;transition:background .12s,border-color .12s}
.logout-btn:hover{background:var(--bg3);border-color:var(--text3)}

/* ── MISC ── */
.conn-status{font-size:10.5px;padding:2px 8px;border-radius:99px;margin-left:8px;font-weight:600;letter-spacing:.02em}
.conn-online{background:#dcfce7;color:#15803d}
.call-btn{background:none;border:none;cursor:pointer;padding:6px 8px;border-radius:8px;font-size:17px;transition:background .12s,transform .1s;color:var(--text3)}
.call-btn:hover{background:var(--bg3);transform:scale(1.08);color:var(--text)}
.header-call-group{display:flex;align-items:center;gap:2px;margin-left:auto;margin-right:4px}
@keyframes slideIn{from{opacity:0;transform:translateY(-16px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes pulse-ring{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.6);opacity:0}}
.incoming-call-banner{position:fixed;top:16px;right:16px;background:var(--bg);border:1.5px solid var(--border);border-radius:18px;padding:18px 20px;box-shadow:var(--shadow-md);z-index:8000;min-width:268px;display:none;animation:slideIn .3s cubic-bezier(.16,1,.3,1)}
.incoming-call-banner.show{display:block}
.inc-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:12px}
.inc-avatar-wrap{position:relative;width:64px;height:64px;margin:0 auto 12px}
.inc-avatar-wrap .ring{position:absolute;inset:-8px;border-radius:50%;border:2px solid #22c55e;animation:pulse-ring 1.4s ease-out infinite}
.inc-avatar-wrap .ring:nth-child(2){animation-delay:.6s}
.inc-avatar-inner{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700}
.inc-caller{font-size:15px;font-weight:700;color:var(--text);text-align:center;margin-bottom:3px;letter-spacing:-.2px}
.inc-type{font-size:12px;color:var(--text2);text-align:center;margin-bottom:14px;font-weight:500}
.inc-actions{display:flex;gap:8px}
.inc-accept{flex:1;padding:9px;border-radius:10px;border:none;background:#22c55e;color:#fff;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:opacity .12s}
.inc-accept:hover{opacity:.88}
.inc-decline{flex:1;padding:9px;border-radius:10px;border:none;background:#ef4444;color:#fff;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:opacity .12s}
.inc-decline:hover{opacity:.88}
.call-overlay{position:fixed;inset:0;background:rgba(8,8,14,.95);backdrop-filter:blur(12px);z-index:9000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.call-overlay.show{display:flex}
.participants-grid{display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:center;width:100%;max-width:900px;padding:0 16px}
.participant-box{position:relative;border-radius:16px;overflow:hidden;background:#13131a;border:1.5px solid rgba(255,255,255,.08);flex-shrink:0}
.participant-box.large{width:min(560px,85vw);aspect-ratio:16/9}
.participant-box.small{width:min(200px,42vw);aspect-ratio:16/9}
.participant-box video{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0}
.participant-avatar{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,#13131a,#1a1a2e);z-index:1}
.participant-avatar .av-circle{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700}
.participant-avatar .av-name{color:rgba(255,255,255,.7);font-size:13px;font-weight:500}
.participant-name-tag{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;z-index:2;display:flex;align-items:center;gap:4px}
.call-info{text-align:center}
.call-status-text{color:rgba(255,255,255,.6);font-size:14px;font-weight:500}
.call-timer{color:#fff;font-size:28px;font-weight:700;letter-spacing:.04em;display:none;font-variant-numeric:tabular-nums}
.call-controls{display:flex;gap:14px;align-items:center}
.ctrl-btn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:transform .12s,background .12s;background:rgba(255,255,255,.1);color:#fff;backdrop-filter:blur(4px)}
.ctrl-btn:hover{transform:scale(1.08);background:rgba(255,255,255,.18)}
.ctrl-btn.active{background:#ef4444}
.ctrl-btn.screen-active{background:#3b82f6}
.ctrl-btn.end-btn{background:#ef4444;width:60px;height:60px;font-size:22px}
.ctrl-btn.end-btn:hover{background:#dc2626}
.mobile-menu-btn{display:none;background:none;border:none;cursor:pointer;font-size:20px;color:var(--text2);padding:4px 6px;border-radius:7px}
.mobile-overlay{display:none;position:fixed;inset:0;z-index:499;background:rgba(0,0,0,.3);backdrop-filter:blur(2px)}
.mobile-overlay.show{display:block}
@media(max-width:600px){
  .sidebar{position:fixed;left:-240px;top:0;bottom:0;z-index:500;width:240px}
  .sidebar.open{left:0;box-shadow:8px 0 32px rgba(0,0,0,.2)}
  .members-panel{display:none}
  .mobile-menu-btn{display:flex}
  .participant-box.large{width:95vw}
  .participant-box.small{width:44vw}
  .ctrl-btn{width:44px;height:44px;font-size:17px}
  .ctrl-btn.end-btn{width:52px;height:52px}
}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>Welcome back 👋</h2>
    <p>Pick a nickname and color to start chatting.</p>
    <input class="login-input" id="loginName" placeholder="Your nickname..." maxlength="20" onkeydown="if(event.key==='Enter')joinChat()"/>
    <div style="display:flex;gap:7px;flex-wrap:wrap" id="loginColors"></div>
    <label class="remember-row">
      <input type="checkbox" id="rememberMe"> Keep me logged in
    </label>
    <button class="login-btn" onclick="joinChat()">Enter Chat →</button>
  </div>
</div>

<div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileSidebar()"></div>

<div class="app" id="appUI" style="display:none">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header"><h2># Channels</h2></div>
    <div class="channel-list" id="channelList"></div>
    <div class="sidebar-footer">
      <div class="user-row">
        <div class="avatar" id="myAvatar" style="background:#dbeafe;color:#1d4ed8">YO</div>
        <div>
          <div class="username" id="myNameDisplay">You</div>
          <div class="user-status"><span class="online-dot" style="width:6px;height:6px;margin-right:3px"></span>Online</div>
        </div>
        <button class="settings-btn" onclick="openSettings()">⚙</button>
      </div>
    </div>
  </div>
  <div class="main">
    <div class="chat-header">
      <button class="mobile-menu-btn" onclick="openMobileSidebar()">☰</button>
      <span style="font-size:17px;color:var(--text3);font-weight:300">#</span>
      <span class="chat-header-name" id="chatTitle">general</span>
      <span class="conn-status conn-online">● live</span>
      <div class="header-call-group">
        <button class="call-btn" onclick="startCall('voice')" title="Voice call">📞</button>
        <button class="call-btn" onclick="startCall('video')" title="Video call">📹</button>
      </div>
      <span style="font-size:11px;color:var(--text3);font-weight:500" id="onlineCount"></span>
    </div>
    <div class="messages" id="messages"></div>
    <div style="padding:0 16px 2px"><div class="typing-indicator" id="typingIndicator"></div></div>
    <div class="input-area">
      <div class="input-row">
        <div style="position:relative">
          <button class="icon-btn" onclick="toggleEmojiPicker()">😊</button>
          <div class="emoji-picker" id="emojiPicker" style="display:none"></div>
        </div>
        <textarea class="chat-input" id="chatInput" placeholder="Message #general..." rows="1"

function appendMessage(msg){

window.startCall=async type=>{

function listenForIncomingCalls(){

    if(data.callerId===userId&&data.status==='accepted'){document.getElementById('callStatusText').textContent='Connected';startCallTimer();}

function showIncomingBanner(data){

  document.getElementById('incCallType').textContent=data.type==='video'?'📹 Video Call':'📞 Voice Call';

function hideIncomingBanner(){document.getElementById('incomingCallBanner').classList.remove('show');incomingCallData=null;}

window.acceptCall=async()=>{
  if(!incomingCallData)return;
  const data=incomingCallData;hideIncomingBanner();
  callType=data.type;
  await set(ref(db,`calls/${currentChannel}/active/status`),'accepted');
  showCallOverlay(data.type);
  document.getElementById('callStatusText').textContent='Connecting...';
  callParticipants={};
  addParticipantBox('local',myName,myBg,myFg,data.type==='video');
  await joinDailyRoom(data.roomName,data.type);
  startCallTimer();
};
window.declineCall=()=>hideIncomingBanner();

// PARTICIPANT BOXES
function addParticipantBox(id,name,bg,fg,isVideo){
  callParticipants[id]={name,bg,fg,videoOn:false,audioOn:true};
  renderParticipantBoxes();
}

function renderParticipantBoxes(){
  const grid=document.getElementById('participantsGrid');
  const ids=Object.keys(callParticipants);
  // Save existing video elements before re-render
  const existingVideos={};
  ids.forEach(id=>{
    const box=document.getElementById(`pbox-${id}`);
    if(box){const vid=box.querySelector('video');if(vid&&vid.srcObject)existingVideos[id]=vid.srcObject;}
  });
  grid.innerHTML='';
  ids.forEach(id=>{
    const p=callParticipants[id];
    const isLocal=id==='local';
    const sizeClass=ids.length===1?'large':(isLocal?'small':'large');
    const box=document.createElement('div');
    box.className=`participant-box ${sizeClass}`;
    box.id=`pbox-${id}`;
    box.innerHTML=`
      <div class="participant-avatar" id="pavatar-${id}" style="display:${p.videoOn?'none':'flex'}">
        <div class="av-circle" style="background:${p.bg};color:${p.fg}">${getInitials(p.name)}</div>
        <div class="av-name">${p.name}${isLocal?' (You)':''}</div>
      </div>
      <div class="participant-name-tag">${p.name}${isLocal?' (You)':''}${!p.audioOn?' 🔇':''}</div>`;
    // Re-attach video if it existed
    if(existingVideos[id]&&p.videoOn){
      const vid=document.createElement('video');
      vid.autoplay=true;vid.playsInline=true;
      if(isLocal)vid.muted=true;
      vid.srcObject=existingVideos[id];
      box.prepend(vid);
    }
    grid.appendChild(box);
  });
}

function setVideoTrack(id,track){
  if(!callParticipants[id])return;
  callParticipants[id].videoOn=true;
  const av=document.getElementById(`pavatar-${id}`);
  if(av)av.style.display='none';
  const box=document.getElementById(`pbox-${id}`);
  if(!box)return;
  let vid=box.querySelector('video');
  if(!vid){
    vid=document.createElement('video');
    vid.autoplay=true;vid.playsInline=true;
    if(id==='local')vid.muted=true;
    box.prepend(vid);
  }
  const stream=new MediaStream([track]);
  vid.srcObject=stream;
  vid.play().catch(()=>{});
}

function clearVideoTrack(id){
  if(!callParticipants[id])return;
  callParticipants[id].videoOn=false;
  const av=document.getElementById(`pavatar-${id}`);
  if(av)av.style.display='flex';
  const box=document.getElementById(`pbox-${id}`);
  if(box){const vid=box.querySelector('video');if(vid)vid.srcObject=null;}
}

// JOIN DAILY
async function joinDailyRoom(roomName,type){
  if(callFrame){try{await callFrame.leave();callFrame.destroy();}catch(e){}callFrame=null;}
  const url=`https://${DAILY_DOMAIN}.daily.co/${roomName}`;
  try{
    callFrame=window.DailyIframe.createCallObject({audioSource:true,videoSource:type==='video'});

    callFrame.on('track-started',e=>{
      const p=e.participant;
      const sid=p.local?'local':p.session_id;
      if(e.track.kind==='audio'&&!p.local){
        let audio=document.getElementById(`audio-${sid}`);
        if(!audio){audio=document.createElement('audio');audio.id=`audio-${sid}`;audio.autoplay=true;document.body.appendChild(audio);}
        const stream=audio.srcObject instanceof MediaStream?audio.srcObject:new MediaStream();
        stream.addTrack(e.track);audio.srcObject=stream;
      }
      if(e.track.kind==='video'){
        setVideoTrack(sid,e.track);
      }
    });

    callFrame.on('track-stopped',e=>{
      const sid=e.participant.local?'local':e.participant.session_id;
      if(e.track.kind==='video')clearVideoTrack(sid);
    });

    callFrame.on('participant-joined',e=>{
      const p=e.participant;
      if(p.local)return;
      document.getElementById('callStatusText').textContent='Connected';
      startCallTimer();
      const pd=Object.values(onlineUsers).find(u=>u.name===p.user_name);
      addParticipantBox(p.session_id,p.user_name||'Guest',pd?.bg||'#dbeafe',pd?.fg||'#1d4ed8',type==='video');
      // Attach any already-present tracks
      if(p.tracks?.video?.persistentTrack)setVideoTrack(p.session_id,p.tracks.video.persistentTrack);
    });

    callFrame.on('participant-updated',e=>{
      const p=e.participant;
      if(p.local)return;
      const sid=p.session_id;
      // Video state
      if(p.tracks?.video?.state==='playable'&&p.tracks?.video?.persistentTrack){
        setVideoTrack(sid,p.tracks.video.persistentTrack);
      } else if(p.tracks?.video?.state==='off'||p.tracks?.video?.state==='interrupted'){
        clearVideoTrack(sid);
      }
      // Screen share
      if(p.tracks?.screenVideo?.state==='playable'&&p.tracks?.screenVideo?.persistentTrack){
        if(!callParticipants[sid+'-screen'])addParticipantBox(sid+'-screen',p.user_name+' screen','#1e293b','#94a3b8',true);
        setVideoTrack(sid+'-screen',p.tracks.screenVideo.persistentTrack);
      } else if(callParticipants[sid+'-screen']){
        delete callParticipants[sid+'-screen'];
        document.getElementById(`pbox-${sid}-screen`)?.remove();
        renderParticipantBoxes();
      }
      // Audio
      if(callParticipants[sid]){
        callParticipants[sid].audioOn=p.tracks?.audio?.state==='playable';
        const tag=document.querySelector(`#pbox-${sid} .participant-name-tag`);
        if(tag)tag.textContent=callParticipants[sid].name+(!callParticipants[sid].audioOn?' 🔇':'');
      }
    });

    callFrame.on('participant-left',e=>{
      const sid=e.participant.session_id;
      delete callParticipants[sid];
      delete callParticipants[sid+'-screen'];
      renderParticipantBoxes();
      document.getElementById(`audio-${sid}`)?.remove();
      if(Object.keys(callParticipants).filter(k=>k!=='local').length===0){
        document.getElementById('callStatusText').textContent='Other person left';
        setTimeout(endCall,2000);
      }
    });

    callFrame.on('error',e=>{console.error('Daily error',e);endCall();});

    await callFrame.join({url,userName:myName});

    // Attach local video
    if(type==='video'){
      const parts=callFrame.participants();
      const localVid=parts.local?.tracks?.video?.persistentTrack;
      if(localVid)setVideoTrack('local',localVid);
    }

  }catch(err){
    console.error('Call error:',err);
    alert(`Could not start call: ${err.message||JSON.stringify(err)}`);
    endCall();
  }
}

function showCallOverlay(type){
  document.getElementById('callOverlay').classList.add('show');
  document.getElementById('camBtn').style.display=type==='video'?'flex':'none';
  document.getElementById('screenBtn').style.display=(!isMobile&&type==='video')?'flex':'none';
}

window.endCall=()=>{
  if(currentCallId){
    set(ref(db,`calls/${currentChannel}/active/status`),'ended')
      .then(()=>setTimeout(()=>remove(ref(db,`calls/${currentChannel}/active`)),2000));
    currentCallId=null;
  }
  if(callFrame){try{callFrame.leave();callFrame.destroy();}catch(e){}callFrame=null;}
  if(callTimerInterval){clearInterval(callTimerInterval);callTimerInterval=null;callSeconds=0;}
  isMuted=false;isCamOff=false;isSharingScreen=false;callParticipants={};
  document.getElementById('callOverlay').classList.remove('show');
  document.getElementById('callTimer').style.display='none';
  document.getElementById('participantsGrid').innerHTML='';
  document.querySelectorAll('audio[id^="audio-"]').forEach(a=>a.remove());
  updateCtrlUI();
};

function startCallTimer(){
  if(callTimerInterval)return;
  const el=document.getElementById('callTimer');
  el.style.display='block';callSeconds=0;
  callTimerInterval=setInterval(()=>{
    callSeconds++;
    const m=Math.floor(callSeconds/60),s=(callSeconds%60).toString().padStart(2,'0');
    el.textContent=`${m}:${s}`;
  },1000);
}

window.toggleMute=()=>{
  if(!callFrame)return;
  isMuted=!isMuted;
  callFrame.setLocalAudio(!isMuted);
  updateCtrlUI();
};

window.toggleCamera=()=>{
  if(!callFrame)return;
  isCamOff=!isCamOff;
  callFrame.setLocalVideo(!isCamOff);
  if(isCamOff){
    clearVideoTrack('local');
  } else {
    // Wait briefly for track to start then attach via track-started event
    setTimeout(()=>{
      const parts=callFrame.participants();
      const t=parts.local?.tracks?.video?.persistentTrack;
      if(t)setVideoTrack('local',t);
    },500);
  }
  updateCtrlUI();
};

window.toggleScreenShare=async()=>{
  if(!callFrame)return;
  try{
    if(!isSharingScreen){await callFrame.startScreenShare();isSharingScreen=true;}
    else{await callFrame.stopScreenShare();isSharingScreen=false;}
    updateCtrlUI();
  }catch(e){console.error(e);}
};

function updateCtrlUI(){
  const mb=document.getElementById('muteBtn'),cb=document.getElementById('camBtn'),sb=document.getElementById('screenBtn');
  mb.textContent=isMuted?'🔇':'🎤';mb.classList.toggle('active',isMuted);
  cb.textContent=isCamOff?'🚫':'📷';cb.classList.toggle('active',isCamOff);
  sb.classList.toggle('screen-active',isSharingScreen);
}

window.openSettings=()=>document.getElementById('settingsModal').classList.add('open');
window.closeSettings=()=>{document.getElementById('settingsModal').classList.remove('open');updatePresence();};

  document.getElementById('myAvatar').style.background=myBg;
  document.getElementById('myAvatar').style.color=myFg;
  renderColorSwatches();
};
function renderColorSwatches(){
  document.getElementById('colorSwatches').innerHTML=avatarColors.map((c,i)=>
    `<div class="color-swatch" style="background:${c.bg};border-color:${i===selectedColorIdx?c.fg:'transparent'}" onclick="setAvatarColor(${i})"></div>`

// EMOJI
window.toggleEmojiPicker=()=>{
  emojiOpen=!emojiOpen;
  const p=document.getElementById('emojiPicker');
  if(emojiOpen){p.innerHTML=emojis.map(e=>`<span class="ep-emoji" onclick="insertEmoji('${e}')">${e}</span>`).join('');p.style.display='flex';}
  else p.style.display='none';
};
window.insertEmoji=e=>{const i=document.getElementById('chatInput');i.value+=e;i.focus();emojiOpen=false;document.getElementById('emojiPicker').style.display='none';};
document.addEventListener('click',e=>{if(emojiOpen&&!e.target.closest('#emojiPicker')&&!e.target.closest('.icon-btn')){emojiOpen=false;document.getElementById('emojiPicker').style.display='none';}});

window.handleKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}};
window.autoResize=el=>{el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';};
window.openMobileSidebar=()=>{document.getElementById('sidebar').classList.add('open');document.getElementById('mobileOverlay').classList.add('show');};
window.closeMobileSidebar=()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('mobileOverlay').classList.remove('show');};

renderLoginColors();
checkSavedLogin();
</script>
</body>
</html>
