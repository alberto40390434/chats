<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f7f7f5;--bg3:#efefec;--sidebar-bg:#f2f1ee;--text:#111;--text2:#666;--text3:#999;--border:#e4e3de;--accent:#2563eb;--accent-light:#eff4ff;--bubble-out:#2563eb;--bubble-out-text:#fff;--bubble-in:#efefec;--bubble-in-text:#111;--font:'DM Sans',sans-serif;--radius:14px;--input-bg:#f2f1ee;}
[data-theme="dark"]{--bg:#1a1a1a;--bg2:#222;--bg3:#2a2a2a;--sidebar-bg:#141414;--text:#f0efe9;--text2:#aaa;--text3:#666;--border:#333;--accent:#4f8ef5;--accent-light:#1a2540;--bubble-out:#4f8ef5;--bubble-out-text:#fff;--bubble-in:#2a2a2a;--bubble-in-text:#f0efe9;--input-bg:#2a2a2a;}
[data-theme="discord"]{--bg:#313338;--bg2:#2b2d31;--bg3:#232428;--sidebar-bg:#2b2d31;--text:#dbdee1;--text2:#949ba4;--text3:#6d6f78;--border:#3a3c40;--accent:#5865f2;--accent-light:#2c2e45;--bubble-out:#5865f2;--bubble-out-text:#fff;--bubble-in:#383a40;--bubble-in-text:#dbdee1;--input-bg:#383a40;}
[data-theme="gamer"]{--bg:#0d0d0d;--bg2:#111;--bg3:#161616;--sidebar-bg:#0a0a0a;--text:#e0ffe0;--text2:#7aab7a;--text3:#3d6b3d;--border:#1a2a1a;--accent:#00ff88;--accent-light:#001a0d;--bubble-out:#00ff88;--bubble-out-text:#000;--bubble-in:#161616;--bubble-in-text:#e0ffe0;--input-bg:#111;}
[data-theme="amoled"]{--bg:#000;--bg2:#0a0a0a;--bg3:#111;--sidebar-bg:#000;--text:#fff;--text2:#888;--text3:#444;--border:#1a1a1a;--accent:#00d4ff;--accent-light:#001a22;--bubble-out:#00d4ff;--bubble-out-text:#000;--bubble-in:#111;--bubble-in-text:#fff;--input-bg:#0f0f0f;}
[data-theme="sunset"]{--bg:#1c1118;--bg2:#231520;--bg3:#2b1a28;--sidebar-bg:#170e14;--text:#fce8f3;--text2:#c48ab5;--text3:#7a4d6e;--border:#3d2238;--accent:#f97316;--accent-light:#2d1506;--bubble-out:#f97316;--bubble-out-text:#fff;--bubble-in:#2b1a28;--bubble-in-text:#fce8f3;--input-bg:#2b1a28;}
[data-theme="mint"]{--bg:#f0faf5;--bg2:#e6f5ee;--bg3:#d4eddf;--sidebar-bg:#e0f2e9;--text:#0d2b1e;--text2:#3d7057;--text3:#6fa88a;--border:#b8dfc9;--accent:#059669;--accent-light:#d1fae5;--bubble-out:#059669;--bubble-out-text:#fff;--bubble-in:#d4eddf;--bubble-in-text:#0d2b1e;--input-bg:#e6f5ee;}
[data-theme="rose"]{--bg:#fff5f7;--bg2:#ffe4ea;--bg3:#fcd0da;--sidebar-bg:#ffe0e8;--text:#2d0a14;--text2:#8b3a50;--text3:#c47a8e;--border:#f5b8c8;--accent:#e11d48;--accent-light:#ffe4ea;--bubble-out:#e11d48;--bubble-out-text:#fff;--bubble-in:#fcd0da;--bubble-in-text:#2d0a14;--input-bg:#ffe4ea;}
[data-theme="ocean"]{--bg:#0a1628;--bg2:#0d1f3c;--bg3:#112847;--sidebar-bg:#071020;--text:#cce7ff;--text2:#6ba3d6;--text3:#3a6b9e;--border:#1a3a5c;--accent:#38bdf8;--accent-light:#0c2a40;--bubble-out:#38bdf8;--bubble-out-text:#000;--bubble-in:#112847;--bubble-in-text:#cce7ff;--input-bg:#0d1f3c;}
[data-theme="forest"]{--bg:#0f1a0f;--bg2:#141f14;--bg3:#1a2a1a;--sidebar-bg:#0a130a;--text:#d4f0d4;--text2:#7ab87a;--text3:#4a7a4a;--border:#1e3a1e;--accent:#4ade80;--accent-light:#0d200d;--bubble-out:#4ade80;--bubble-out-text:#000;--bubble-in:#1a2a1a;--bubble-in-text:#d4f0d4;--input-bg:#141f14;}
[data-theme="lavender"]{--bg:#f5f0ff;--bg2:#ede5ff;--bg3:#ddd0ff;--sidebar-bg:#e8deff;--text:#1a0a2e;--text2:#6b4fa0;--text3:#9b7fcb;--border:#c9b5f0;--accent:#7c3aed;--accent-light:#ede5ff;--bubble-out:#7c3aed;--bubble-out-text:#fff;--bubble-in:#ddd0ff;--bubble-in-text:#1a0a2e;--input-bg:#ede5ff;}
[data-theme="cyberpunk"]{--bg:#0a0015;--bg2:#0f0020;--bg3:#150030;--sidebar-bg:#07000f;--text:#ff00ff;--text2:#cc00cc;--text3:#880088;--border:#2a0040;--accent:#ff00ff;--accent-light:#1a0025;--bubble-out:#ff00ff;--bubble-out-text:#000;--bubble-in:#150030;--bubble-in-text:#ff00ff;--input-bg:#0f0020;}
[data-theme="coffee"]{--bg:#faf6f0;--bg2:#f0e8d8;--bg3:#e4d4b8;--sidebar-bg:#ecdfc8;--text:#2c1a08;--text2:#6b4226;--text3:#9e7048;--border:#d4b896;--accent:#92400e;--accent-light:#fef3c7;--bubble-out:#92400e;--bubble-out-text:#fff;--bubble-in:#e4d4b8;--bubble-in-text:#2c1a08;--input-bg:#f0e8d8;}
[data-theme="slate"]{--bg:#0f172a;--bg2:#1e293b;--bg3:#263348;--sidebar-bg:#0a1120;--text:#e2e8f0;--text2:#94a3b8;--text3:#475569;--border:#2d3f55;--accent:#6366f1;--accent-light:#1e1b4b;--bubble-out:#6366f1;--bubble-out-text:#fff;--bubble-in:#263348;--bubble-in-text:#e2e8f0;--input-bg:#1e293b;}
[data-theme="sakura"]{--bg:#fff0f5;--bg2:#ffe4ef;--bg3:#ffcce0;--sidebar-bg:#ffdcea;--text:#3d0020;--text2:#a0406a;--text3:#d480a0;--border:#ffb0d0;--accent:#ff69a0;--accent-light:#fff0f5;--bubble-out:#ff69a0;--bubble-out-text:#fff;--bubble-in:#ffcce0;--bubble-in-text:#3d0020;--input-bg:#ffe4ef;}
[data-theme="nord"]{--bg:#2e3440;--bg2:#3b4252;--bg3:#434c5e;--sidebar-bg:#272c36;--text:#eceff4;--text2:#d8dee9;--text3:#7b88a1;--border:#4c566a;--accent:#88c0d0;--accent-light:#3b4a52;--bubble-out:#88c0d0;--bubble-out-text:#2e3440;--bubble-in:#434c5e;--bubble-in-text:#eceff4;--input-bg:#3b4252;}
[data-theme="fire"]{--bg:#0f0500;--bg2:#1a0800;--bg3:#250c00;--sidebar-bg:#0a0300;--text:#ffe8cc;--text2:#ff8c42;--text3:#8b4000;--border:#3d1500;--accent:#ff4500;--accent-light:#1f0900;--bubble-out:#ff4500;--bubble-out-text:#fff;--bubble-in:#250c00;--bubble-in-text:#ffe8cc;--input-bg:#1a0800;}
[data-theme="ice"]{--bg:#f0f8ff;--bg2:#e0f0ff;--bg3:#c8e8ff;--sidebar-bg:#d8ecff;--text:#001830;--text2:#2060a0;--text3:#60a0d8;--border:#a0d0f0;--accent:#0080ff;--accent-light:#e0f0ff;--bubble-out:#0080ff;--bubble-out-text:#fff;--bubble-in:#c8e8ff;--bubble-in-text:#001830;--input-bg:#e0f0ff;}
[data-theme="mono"]{--bg:#fff;--bg2:#f5f5f5;--bg3:#e8e8e8;--sidebar-bg:#f0f0f0;--text:#000;--text2:#444;--text3:#888;--border:#ccc;--accent:#000;--accent-light:#e8e8e8;--bubble-out:#000;--bubble-out-text:#fff;--bubble-in:#e8e8e8;--bubble-in-text:#000;--input-bg:#f0f0f0;}
[data-theme="hacker"]{--bg:#000;--bg2:#001400;--bg3:#002000;--sidebar-bg:#000800;--text:#00ff00;--text2:#00cc00;--text3:#006600;--border:#003300;--accent:#00ff00;--accent-light:#001a00;--bubble-out:#00ff00;--bubble-out-text:#000;--bubble-in:#002000;--bubble-in-text:#00ff00;--input-bg:#001400;}

body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;font-size:14px;transition:background .2s,color .2s}
.app{display:flex;height:100vh;overflow:hidden}

/* Login */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;width:300px;display:flex;flex-direction:column;gap:14px}
.login-box h2{font-size:18px;font-weight:600;color:var(--text)}
.login-box p{font-size:13px;color:var(--text2)}
.login-input{padding:10px 12px;border-radius:9px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-family:var(--font);font-size:16px;outline:none;width:100%}
.login-input:focus{border-color:var(--accent)}
.login-btn{padding:10px;background:var(--accent);border:none;border-radius:9px;color:#fff;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;width:100%}
.login-btn:hover{opacity:.87}
.remember-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);cursor:pointer}
.remember-row input{accent-color:var(--accent);width:15px;height:15px;cursor:pointer}

/* Sidebar */
.sidebar{width:220px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px 14px 12px;border-bottom:1px solid var(--border)}
.sidebar-header h2{font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text2)}
.channel-list{flex:1;overflow-y:auto;padding:8px 0}
.channel{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:6px;margin:1px 6px;cursor:pointer;color:var(--text2);font-size:13.5px;transition:background .12s,color .12s;user-select:none}
.channel:hover{background:var(--bg3);color:var(--text)}
.channel.active{background:var(--accent-light);color:var(--accent);font-weight:500}
.unread-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:99px;min-width:18px;text-align:center}
.sidebar-footer{padding:10px;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:8px}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.username{font-size:13px;font-weight:500;color:var(--text)}
.user-status{font-size:11px;color:var(--text3)}
.settings-btn{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:4px;border-radius:6px;transition:background .12s}
.settings-btn:hover{background:var(--bg3);color:var(--text)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg);flex-shrink:0}
.chat-header-name{font-weight:600;font-size:15px}
.chat-header-desc{font-size:12px;color:var(--text3)}
.online-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:4px}
.conn-status{font-size:11px;padding:2px 8px;border-radius:99px;margin-left:4px}
.conn-online{background:#dcfce7;color:#166534}
.conn-offline{background:#fee2e2;color:#991b1b}

/* Call buttons */
.header-call-group{display:flex;align-items:center;gap:2px;margin-left:auto;margin-right:4px}
.call-btn{background:none;border:none;cursor:pointer;padding:6px 8px;border-radius:8px;font-size:18px;transition:background .12s,transform .1s;color:var(--text2)}
.call-btn:hover{background:var(--bg3);transform:scale(1.1)}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:3px;background:var(--bg)}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.day-divider{display:flex;align-items:center;gap:10px;margin:10px 0;color:var(--text3);font-size:11px}
.day-divider::before,.day-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.msg-group{display:flex;flex-direction:column;gap:2px;margin:4px 0}
.msg-row{display:flex;align-items:flex-end;gap:8px}
.msg-row.out{flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;margin-bottom:2px}
.msg-row.continuation .msg-avatar{visibility:hidden}
.msg-content{display:flex;flex-direction:column;max-width:72%}
.msg-row.out .msg-content{align-items:flex-end}
.msg-sender{font-size:11px;color:var(--text3);margin-bottom:2px;padding-left:2px}
.bubble{padding:9px 13px;border-radius:var(--radius);font-size:13.5px;line-height:1.5;word-break:break-word}
.bubble.in{background:var(--bubble-in);color:var(--bubble-in-text);border-bottom-left-radius:4px}
.bubble.out{background:var(--bubble-out);color:var(--bubble-out-text);border-bottom-right-radius:4px}
.msg-row.continuation .bubble.in{border-top-left-radius:4px}
.msg-row.continuation .bubble.out{border-top-right-radius:4px}
.msg-meta{display:flex;align-items:center;gap:6px;margin-top:2px;padding:0 2px}
.msg-time{font-size:10.5px;color:var(--text3)}

/* Input */
.input-area{padding:12px 16px;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0}
.input-row{display:flex;align-items:flex-end;gap:8px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius);padding:6px 8px;transition:border-color .15s}
.input-row:focus-within{border-color:var(--accent)}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px 6px;border-radius:6px;font-size:16px;transition:color .12s,background .12s;position:relative}
.icon-btn:hover{color:var(--accent);background:var(--accent-light)}
.chat-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:16px;resize:none;min-height:22px;max-height:120px;line-height:1.5;padding:2px 4px}
.chat-input::placeholder{color:var(--text3)}
.send-btn{background:var(--accent);border:none;cursor:pointer;color:#fff;padding:6px 14px;border-radius:9px;font-size:13.5px;transition:opacity .12s;flex-shrink:0;font-family:var(--font);font-weight:500}
.send-btn:hover{opacity:.85}
.emoji-picker{position:absolute;bottom:calc(100% + 8px);left:0;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px;display:flex;gap:6px;flex-wrap:wrap;width:200px;box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:100}
.ep-emoji{font-size:20px;cursor:pointer;padding:4px;border-radius:6px;transition:background .1s}
.ep-emoji:hover{background:var(--bg3)}

/* Members */
.members-panel{width:180px;border-left:1px solid var(--border);background:var(--sidebar-bg);overflow-y:auto;flex-shrink:0;padding:12px 0}
.members-panel h3{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:0 12px 8px}
.member-row{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:6px;margin:1px 4px}
.member-name{font-size:13px;color:var(--text2)}
.member-dot{width:9px;height:9px;border-radius:50%;background:#22c55e;flex-shrink:0;margin-left:auto}

/* Typing */
.typing-indicator{display:flex;align-items:center;gap:6px;padding:4px 2px;min-height:20px;font-size:12px;color:var(--text3)}
.typing-dots{display:flex;gap:3px}
.typing-dot{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:bounce 1.2s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

/* Settings modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity .15s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg);border-radius:16px;border:1px solid var(--border);padding:24px;width:340px;max-height:85vh;overflow-y:auto;transform:translateY(8px);transition:transform .15s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal h2{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--text)}
.setting-group{margin-bottom:16px}
.setting-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;display:block}
.color-swatches{display:flex;gap:6px;flex-wrap:wrap}
.color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .1s}
.close-btn{width:100%;padding:9px;background:var(--accent);border:none;border-radius:9px;color:#fff;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;margin-top:8px}
.logout-btn{width:100%;padding:9px;background:none;border:1px solid var(--border);border-radius:9px;color:var(--text2);font-family:var(--font);font-size:13px;cursor:pointer;margin-top:6px}
.logout-btn:hover{background:var(--bg3)}

/* Theme accordion */
.theme-category{margin-bottom:8px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.theme-cat-header{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;cursor:pointer;background:var(--bg2);font-size:13px;font-weight:500;color:var(--text2);user-select:none;transition:background .12s}
.theme-cat-header:hover{background:var(--bg3)}
.theme-cat-arrow{font-size:10px;transition:transform .2s}
.theme-cat-body{display:none;padding:8px;background:var(--bg);display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.theme-cat-body.collapsed{display:none}
.theme-btn{padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg2);cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;color:var(--text2);transition:all .12s;text-align:left;width:100%}
.theme-btn:hover,.theme-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}

/* Cross-channel notification toast */
.notif-toast{position:fixed;top:16px;right:16px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;box-shadow:0 4px 24px rgba(0,0,0,.18);z-index:7000;min-width:220px;max-width:300px;display:none;cursor:pointer;transition:transform .15s}
.notif-toast.show{display:block;animation:slideInRight .22s ease}
@keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.notif-channel{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);margin-bottom:3px}
.notif-sender{font-size:13px;font-weight:600;color:var(--text)}
.notif-preview{font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.notif-click{font-size:10px;color:var(--text3);margin-top:4px}

/* Call overlay & incoming banner */
@keyframes slideIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-ring{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.5);opacity:0}}
.incoming-call-banner{position:fixed;top:16px;right:16px;background:var(--bg);border:1.5px solid var(--border);border-radius:16px;padding:16px 18px;box-shadow:0 8px 32px rgba(0,0,0,.18);z-index:8000;min-width:260px;display:none;animation:slideIn .25s ease}
.incoming-call-banner.show{display:block}
.inc-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:10px}
.inc-avatar-wrap{position:relative;width:64px;height:64px;margin:0 auto 10px}
.inc-avatar-wrap .ring{position:absolute;inset:-8px;border-radius:50%;border:2px solid #22c55e;animation:pulse-ring 1.4s ease-out infinite}
.inc-avatar-wrap .ring:nth-child(2){animation-delay:.6s}
.inc-avatar-inner{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700}
.inc-caller{font-size:15px;font-weight:600;color:var(--text);text-align:center;margin-bottom:3px}
.inc-type{font-size:12px;color:var(--text2);text-align:center;margin-bottom:14px}
.inc-actions{display:flex;gap:8px}
.inc-accept{flex:1;padding:8px;border-radius:9px;border:none;background:#22c55e;color:#fff;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer}
.inc-decline{flex:1;padding:8px;border-radius:9px;border:none;background:#ef4444;color:#fff;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer}
.call-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.call-overlay.show{display:flex}
.participants-grid{display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:center;width:100%;max-width:900px;padding:0 16px}
.participant-box{position:relative;border-radius:14px;overflow:hidden;background:#1a1a1a;border:2px solid #333;flex-shrink:0}
.participant-box.large{width:min(560px,85vw);aspect-ratio:16/9}
.participant-box.small{width:min(200px,42vw);aspect-ratio:16/9}
.participant-box video{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0}
.participant-avatar{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:#1e1e2e;z-index:1}
.participant-avatar .av-circle{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700}
.participant-avatar .av-name{color:#fff;font-size:13px;opacity:.8}
.participant-name-tag{position:absolute;bottom:8px;left:10px;background:rgba(0,0,0,.6);color:#fff;font-size:11px;font-weight:500;padding:2px 8px;border-radius:99px;z-index:2;display:flex;align-items:center;gap:4px}
.call-info{text-align:center}
.call-status-text{color:#fff;font-size:14px;opacity:.7}
.call-timer{color:#fff;font-size:24px;font-weight:600;letter-spacing:.04em;display:none}
.call-controls{display:flex;gap:14px;align-items:center}
.ctrl-btn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:transform .12s;background:rgba(255,255,255,.12);color:#fff}
.ctrl-btn:hover{transform:scale(1.08)}
.ctrl-btn.active{background:#ef4444}
.ctrl-btn.screen-active{background:#3b82f6}
.ctrl-btn.end-btn{background:#ef4444;width:60px;height:60px;font-size:22px}
.mobile-menu-btn{display:none;background:none;border:none;cursor:pointer;font-size:20px;color:var(--text2);padding:4px 6px;border-radius:6px}
.mobile-overlay{display:none;position:fixed;inset:0;z-index:499;background:rgba(0,0,0,.3)}
.mobile-overlay.show{display:block}
@media(max-width:600px){
  .sidebar{position:fixed;left:-220px;top:0;bottom:0;z-index:500;transition:left .22s}
  .sidebar.open{left:0;box-shadow:4px 0 24px rgba(0,0,0,.18)}
  .members-panel{display:none}
  .mobile-menu-btn{display:flex}
  .participant-box.large{width:95vw}
  .participant-box.small{width:44vw}
  .ctrl-btn{width:44px;height:44px;font-size:17px}
  .ctrl-btn.end-btn{width:52px;height:52px}
}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>👋 Welcome to Chat</h2>
    <p>Enter a nickname to start chatting with real people!</p>
    <input class="login-input" id="loginName" placeholder="Your nickname..." maxlength="20" onkeydown="if(event.key==='Enter')joinChat()"/>
    <div style="display:flex;gap:6px;flex-wrap:wrap" id="loginColors"></div>
    <label class="remember-row"><input type="checkbox" id="rememberMe"> Keep me logged in</label>
    <button class="login-btn" onclick="joinChat()">Join Chat</button>
  </div>
</div>

<div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileSidebar()"></div>

<div class="app" id="appUI" style="display:none">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header"><h2># Channels</h2></div>
    <div class="channel-list" id="channelList"></div>
    <div class="sidebar-footer">
      <div class="user-row">
        <div class="avatar" id="myAvatar" style="background:#dbeafe;color:#1d4ed8">YO</div>
        <div>
          <div class="username" id="myNameDisplay">You</div>
          <div class="user-status"><span class="online-dot" style="width:6px;height:6px;margin-right:3px"></span>Online</div>
        </div>
        <button class="settings-btn" onclick="openSettings()">⚙</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="chat-header">
      <button class="mobile-menu-btn" onclick="openMobileSidebar()">☰</button>
      <span style="font-size:16px;color:var(--text2)">#</span>
      <span class="chat-header-name" id="chatTitle">general</span>
      <span class="conn-status conn-online" id="connStatus">● live</span>
      <div class="header-call-group">
        <button class="call-btn" onclick="startCall('voice')" title="Voice call">📞</button>
        <button class="call-btn" onclick="startCall('video')" title="Video call">📹</button>
      </div>
      <span class="chat-header-desc" id="onlineCount"></span>
    </div>
    <div class="messages" id="messages"></div>
    <div style="padding:0 16px 2px"><div class="typing-indicator" id="typingIndicator"></div></div>
    <div class="input-area">
      <div class="input-row">
        <div style="position:relative">
          <button class="icon-btn" onclick="toggleEmojiPicker()">😊</button>
          <div class="emoji-picker" id="emojiPicker" style="display:none"></div>
        </div>
        <textarea class="chat-input" id="chatInput" placeholder="Message #general..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this);handleTyping()"></textarea>
        <button class="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
  <div class="members-panel" id="membersPanel"></div>
</div>

<!-- Cross-channel notification toast -->
<div class="notif-toast" id="notifToast" onclick="jumpToChannel()">
  <div class="notif-channel" id="notifChannel">#general</div>
  <div class="notif-sender" id="notifSender"></div>
  <div class="notif-preview" id="notifPreview"></div>
  <div class="notif-click">Tap to switch →</div>
</div>

<!-- Incoming call banner -->
<div class="incoming-call-banner" id="incomingCallBanner">
  <div class="inc-title">📲 Incoming Call</div>
  <div class="inc-avatar-wrap">
    <div class="ring"></div><div class="ring"></div>
    <div class="inc-avatar-inner" id="incCallerAvatar"></div>
  </div>
  <div class="inc-caller" id="incCallerName"></div>
  <div class="inc-type" id="incCallType"></div>
  <div class="inc-actions">
    <button class="inc-accept" onclick="acceptCall()">✅ Accept</button>
    <button class="inc-decline" onclick="declineCall()">✖ Decline</button>
  </div>
</div>

<!-- Call overlay -->
<div class="call-overlay" id="callOverlay">
  <div class="participants-grid" id="participantsGrid"></div>
  <div class="call-info">
    <div class="call-status-text" id="callStatusText">Calling...</div>
    <div class="call-timer" id="callTimer">0:00</div>
  </div>
  <div class="call-controls">
    <button class="ctrl-btn" id="muteBtn" onclick="toggleMute()">🎤</button>
    <button class="ctrl-btn" id="camBtn" onclick="toggleCamera()" style="display:none">📷</button>
    <button class="ctrl-btn" id="screenBtn" onclick="toggleScreenShare()" style="display:none">🖥</button>
    <button class="ctrl-btn end-btn" onclick="endCall()">📵</button>
  </div>
</div>

<!-- Settings -->
<div class="modal-overlay" id="settingsModal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2>⚙ Settings</h2>

    <div class="setting-group">
      <span class="setting-label">Theme</span>

      <div class="theme-category">
        <div class="theme-cat-header" onclick="toggleCat('cat-light')">☀️ Light <span class="theme-cat-arrow" id="arrow-cat-light">▼</span></div>
        <div class="theme-cat-body collapsed" id="cat-light">
          <button class="theme-btn" onclick="setTheme('',this)">☀ Modern</button>
          <button class="theme-btn" onclick="setTheme('mint',this)">🌿 Mint</button>
          <button class="theme-btn" onclick="setTheme('rose',this)">🌸 Rose</button>
          <button class="theme-btn" onclick="setTheme('lavender',this)">💜 Lavender</button>
          <button class="theme-btn" onclick="setTheme('coffee',this)">☕ Coffee</button>
          <button class="theme-btn" onclick="setTheme('sakura',this)">🌺 Sakura</button>
          <button class="theme-btn" onclick="setTheme('ice',this)">🧊 Ice</button>
          <button class="theme-btn" onclick="setTheme('mono',this)">⬜ Mono</button>
        </div>
      </div>

      <div class="theme-category">
        <div class="theme-cat-header" onclick="toggleCat('cat-dark')">🌙 Dark <span class="theme-cat-arrow" id="arrow-cat-dark">▼</span></div>
        <div class="theme-cat-body collapsed" id="cat-dark">
          <button class="theme-btn" onclick="setTheme('dark',this)">🌙 Dark</button>
          <button class="theme-btn" onclick="setTheme('amoled',this)">🌌 AMOLED</button>
          <button class="theme-btn" onclick="setTheme('slate',this)">🪨 Slate</button>
          <button class="theme-btn" onclick="setTheme('nord',this)">❄ Nord</button>
          <button class="theme-btn" onclick="setTheme('ocean',this)">🌊 Ocean</button>
          <button class="theme-btn" onclick="setTheme('forest',this)">🌲 Forest</button>
          <button class="theme-btn" onclick="setTheme('sunset',this)">🌅 Sunset</button>
          <button class="theme-btn" onclick="setTheme('fire',this)">🔥 Fire</button>
        </div>
      </div>

      <div class="theme-category">
        <div class="theme-cat-header" onclick="toggleCat('cat-special')">✨ Special <span class="theme-cat-arrow" id="arrow-cat-special">▼</span></div>
        <div class="theme-cat-body collapsed" id="cat-special">
          <button class="theme-btn" onclick="setTheme('discord',this)">💬 Discord</button>
          <button class="theme-btn" onclick="setTheme('gamer',this)">🎮 Gamer</button>
          <button class="theme-btn" onclick="setTheme('cyberpunk',this)">🤖 Cyberpunk</button>
          <button class="theme-btn" onclick="setTheme('hacker',this)">💻 Hacker</button>
        </div>
      </div>
    </div>

    <div class="setting-group">
      <span class="setting-label">Avatar color</span>
      <div class="color-swatches" id="colorSwatches"></div>
    </div>

    <button class="close-btn" onclick="closeSettings()">Done</button>
    <button class="logout-btn" onclick="logout()">🚪 Log out</button>
  </div>
</div>

<script src="https://unpkg.com/@daily-co/daily-js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, onValue, set, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBROTXo_86kA1i29WyFBowDXwIKPC2Ddmw",
  authDomain: "chats-b0699.firebaseapp.com",
  databaseURL: "https://chats-b0699-default-rtdb.firebaseio.com",
  projectId: "chats-b0699",
  storageBucket: "chats-b0699.firebasestorage.app",
  messagingSenderId: "399848929770",
  appId: "1:399848929770:web:f8b5630dc2121737cdda93",
  measurementId: "G-1L8TL72PTT"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const DAILY_DOMAIN = 'schoolchats';
const channels = ['general','random','tech-talk','off-topic'];
const avatarColors = [
  {bg:'#dbeafe',fg:'#1d4ed8'},{bg:'#dcfce7',fg:'#166534'},
  {bg:'#fce7f3',fg:'#9d174d'},{bg:'#fef9c3',fg:'#854d0e'},
  {bg:'#f3e8ff',fg:'#6b21a8'},{bg:'#ffe4e6',fg:'#9f1239'},
];
const emojis = ['👍','❤️','😂','😮','😢','🎉','🔥','✅','👏','🙌'];
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

let myName='', myBg='#dbeafe', myFg='#1d4ed8', selectedColorIdx=0;
let currentChannel='general', emojiOpen=false, typingTimer=null;
let userId='user_'+Math.random().toString(36).slice(2,9);
let onlineUsers={}, messageListeners={};
let callFrame=null, currentCallId=null;
let callTimerInterval=null, callSeconds=0;
let isMuted=false, isCamOff=false, isSharingScreen=false;
let incomingCallData=null, callType='voice';
let callParticipants={};
let notifTimer=null, notifChannel=null;

// ── iOS audio unlock ──
// On iOS, AudioContext must be resumed after a user gesture
function unlockAudio() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = ctx.createBuffer(1,1,22050);
    const src = ctx.createBufferSource();
    src.buffer = buf; src.connect(ctx.destination); src.start(0);
    ctx.resume().catch(()=>{});
  } catch(e) {}
  document.removeEventListener('touchstart', unlockAudio);
  document.removeEventListener('click', unlockAudio);
}
document.addEventListener('touchstart', unlockAudio, {once:true});
document.addEventListener('click', unlockAudio, {once:true});

const getInitials = n => n.slice(0,2).toUpperCase();
const nowTime = () => {
  const d=new Date(),h=d.getHours()%12||12,m=d.getMinutes().toString().padStart(2,'0');
  return `${h}:${m} ${d.getHours()<12?'AM':'PM'}`;
};
const escapeHtml = t => t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ── Remember me ──
function checkSavedLogin() {
  const saved = localStorage.getItem('chatLogin');
  if (saved) {
    try {
      const {name,bg,fg,idx,theme} = JSON.parse(saved);
      myName=name; myBg=bg; myFg=fg; selectedColorIdx=idx||0;
      if (theme) document.body.setAttribute('data-theme', theme);
      launchApp();
    } catch(e) { localStorage.removeItem('chatLogin'); }
  }
}
function saveLogin() {
  if (document.getElementById('rememberMe').checked) {
    localStorage.setItem('chatLogin', JSON.stringify({
      name:myName, bg:myBg, fg:myFg, idx:selectedColorIdx,
      theme:document.body.getAttribute('data-theme')||''
    }));
  }
}
window.logout = () => { localStorage.removeItem('chatLogin'); location.reload(); };

// ── Login ──
function renderLoginColors() {
  document.getElementById('loginColors').innerHTML = avatarColors.map((c,i) =>
    `<div style="width:26px;height:26px;border-radius:50%;background:${c.bg};border:2px solid ${i===0?c.fg:'transparent'};cursor:pointer" onclick="selectLoginColor(${i},this)"></div>`
  ).join('');
}
window.selectLoginColor = (idx) => {
  selectedColorIdx=idx; myBg=avatarColors[idx].bg; myFg=avatarColors[idx].fg;
  document.querySelectorAll('#loginColors div').forEach((d,i) =>
    d.style.borderColor = i===idx ? avatarColors[idx].fg : 'transparent'
  );
};
window.joinChat = () => {
  const name = document.getElementById('loginName').value.trim();
  if (!name) { document.getElementById('loginName').focus(); return; }
  myName = name;
  saveLogin();
  launchApp();
};
function launchApp() {
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appUI').style.display='flex';
  document.getElementById('myNameDisplay').textContent=myName;
  document.getElementById('myAvatar').textContent=getInitials(myName);
  document.getElementById('myAvatar').style.background=myBg;
  document.getElementById('myAvatar').style.color=myFg;
  startPresence(); renderChannels(); renderColorSwatches();
  listenToChannel(currentChannel);
  listenToOnlineUsers();
  listenForIncomingCalls();
  // FIX: listen to all channels for cross-channel notifications
  channels.forEach(ch => { if (ch !== currentChannel) listenToChannelNotifs(ch); });
  setTimeout(() => {
    onValue(ref(db,`typing/${currentChannel}`), snap => {
      const typers=[],now=Date.now();
      snap.forEach(c => { const d=c.val(); if(c.key!==userId&&now-d.ts<3000) typers.push(d.name); });
      const el=document.getElementById('typingIndicator');
      el.innerHTML = typers.length
        ? `<div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div><span>${typers.join(', ')} ${typers.length>1?'are':'is'} typing...</span>`
        : '';
    });
  }, 500);
}

// ── Presence ──
const updatePresence = () => set(ref(db,`presence/${currentChannel}/${userId}`),{name:myName,bg:myBg,fg:myFg,ts:Date.now()});
const removePresence = () => remove(ref(db,`presence/${currentChannel}/${userId}`));
function startPresence() { updatePresence(); setInterval(updatePresence,15000); window.addEventListener('beforeunload',removePresence); }
function listenToOnlineUsers() {
  onValue(ref(db,`presence/${currentChannel}`), snap => {
    onlineUsers={}; const now=Date.now();
    snap.forEach(c => { const d=c.val(); if(now-d.ts<30000) onlineUsers[c.key]=d; });
    renderMembers();
    document.getElementById('onlineCount').innerHTML=`<span class="online-dot"></span>${Object.keys(onlineUsers).length} online`;
  });
}

// ── Channels ──
function renderChannels() {
  document.getElementById('channelList').innerHTML = channels.map(c =>
    `<div class="channel ${c===currentChannel?'active':''}" onclick="window.switchChannel('${c}')">
      <span style="opacity:.7">#</span><span>${c}</span>
    </div>`
  ).join('');
}
window.switchChannel = ch => {
  removePresence(); currentChannel=ch;
  document.getElementById('chatTitle').textContent=ch;
  document.getElementById('chatInput').placeholder=`Message #${ch}...`;
  document.getElementById('messages').innerHTML='';
  renderChannels(); updatePresence();
  listenToChannel(ch); listenToOnlineUsers(); closeMobileSidebar();
};

// ── Messages ──
function listenToChannel(ch) {
  if (messageListeners[ch]) return;
  messageListeners[ch] = true;
  onChildAdded(ref(db,`messages/${ch}`), snap => {
    if (ch !== currentChannel) return;
    appendMessage(snap.val());
  });
}

// FIX: cross-channel notifications — separate listener that only fires for other channels
function listenToChannelNotifs(ch) {
  let initialLoad = true;
  onChildAdded(ref(db,`messages/${ch}`), snap => {
    if (initialLoad) return; // skip history on first load
    if (ch === currentChannel) return; // already visible
    const msg = snap.val();
    if (msg.name === myName) return; // don't notify for own messages
    showNotifToast(ch, msg);
  });
  // mark initial load done after a tick
  setTimeout(() => { initialLoad = false; }, 1500);
}

// FIX: when switching channels, start notif listener for old channel and new one
const _origSwitchChannel = window.switchChannel;
window.switchChannel = ch => {
  const prev = currentChannel;
  _origSwitchChannel(ch);
  // ensure notif listener exists for previous channel
  if (!messageListeners[prev]) listenToChannelNotifs(prev);
  if (!messageListeners[ch]) listenToChannel(ch);
};

function showNotifToast(ch, msg) {
  notifChannel = ch;
  document.getElementById('notifChannel').textContent = '#' + ch;
  document.getElementById('notifSender').textContent = msg.name;
  document.getElementById('notifPreview').textContent = msg.text;
  const toast = document.getElementById('notifToast');
  toast.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => toast.classList.remove('show'), 5000);
}
window.jumpToChannel = () => {
  if (notifChannel) { window.switchChannel(notifChannel); notifChannel=null; }
  document.getElementById('notifToast').classList.remove('show');
};

function appendMessage(msg) {
  const container=document.getElementById('messages');
  const isOut=msg.name===myName;
  const rows=container.querySelectorAll('.msg-row');
  const lastRow=rows[rows.length-1];
  const isCont=lastRow?lastRow.dataset.from===msg.name:false;
  const bg=isOut?myBg:(msg.bg||'#e5e7eb'),fg=isOut?myFg:(msg.fg||'#374151');
  const div=document.createElement('div');
  div.className='msg-group';
  div.innerHTML=`
    <div class="msg-row ${isOut?'out':''} ${isCont?'continuation':''}" data-from="${msg.name}">
      <div class="msg-avatar" style="background:${bg};color:${fg}">${getInitials(msg.name)}</div>
      <div class="msg-content">
        ${!isCont&&!isOut?`<div class="msg-sender">${escapeHtml(msg.name)}</div>`:''}
        <div class="bubble ${isOut?'out':'in'}">${escapeHtml(msg.text)}</div>
        <div class="msg-meta"><span class="msg-time">${msg.time}</span></div>
      </div>
    </div>`;
  container.appendChild(div);
  container.scrollTop=container.scrollHeight;
}

window.sendMessage = () => {
  const input=document.getElementById('chatInput'), text=input.value.trim();
  if (!text) return;
  push(ref(db,`messages/${currentChannel}`),{name:myName,text,time:nowTime(),bg:myBg,fg:myFg,ts:Date.now()});
  input.value=''; autoResize(input); clearTypingIndicator();
};

// ── Typing ──
window.handleTyping = () => {
  set(ref(db,`typing/${currentChannel}/${userId}`),{name:myName,ts:Date.now()});
  clearTimeout(typingTimer); typingTimer=setTimeout(clearTypingIndicator,2000);
};
const clearTypingIndicator = () => remove(ref(db,`typing/${currentChannel}/${userId}`));

// ── Members ──
function renderMembers() {
  const users=Object.values(onlineUsers);
  document.getElementById('membersPanel').innerHTML=`<h3>Online — ${users.length}</h3>`+
    users.map(u=>`<div class="member-row">
      <div class="avatar" style="width:26px;height:26px;font-size:9px;background:${u.bg||'#dbeafe'};color:${u.fg||'#1d4ed8'}">${getInitials(u.name)}</div>
      <span class="member-name">${u.name}</span><div class="member-dot"></div>
    </div>`).join('');
}

// ── Theme accordion ──
window.toggleCat = id => {
  const body=document.getElementById(id);
  const arrow=document.getElementById('arrow-'+id);
  const collapsed=body.classList.toggle('collapsed');
  arrow.style.transform=collapsed?'':'rotate(180deg)';
};

// ── Settings ──
window.openSettings=()=>document.getElementById('settingsModal').classList.add('open');
window.closeSettings=()=>{document.getElementById('settingsModal').classList.remove('open');updatePresence();};
window.handleOverlayClick=e=>{if(e.target===e.currentTarget)closeSettings();};
window.setTheme=(theme,btn)=>{
  document.body.setAttribute('data-theme',theme);
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // save theme if remember me was used
  try {
    const saved=localStorage.getItem('chatLogin');
    if (saved) { const p=JSON.parse(saved); p.theme=theme; localStorage.setItem('chatLogin',JSON.stringify(p)); }
  } catch(e){}
};
window.setAvatarColor=idx=>{
  selectedColorIdx=idx; myBg=avatarColors[idx].bg; myFg=avatarColors[idx].fg;
  document.getElementById('myAvatar').style.background=myBg;
  document.getElementById('myAvatar').style.color=myFg;
  renderColorSwatches();
};
function renderColorSwatches(){
  document.getElementById('colorSwatches').innerHTML=avatarColors.map((c,i)=>
    `<div class="color-swatch" style="background:${c.bg};border-color:${i===selectedColorIdx?c.fg:'transparent'}" onclick="setAvatarColor(${i})"></div>`
  ).join('');
}

// ── Emoji ──
window.toggleEmojiPicker=()=>{
  emojiOpen=!emojiOpen;
  const p=document.getElementById('emojiPicker');
  if(emojiOpen){p.innerHTML=emojis.map(e=>`<span class="ep-emoji" onclick="insertEmoji('${e}')">${e}</span>`).join('');p.style.display='flex';}
  else p.style.display='none';
};
window.insertEmoji=e=>{const i=document.getElementById('chatInput');i.value+=e;i.focus();emojiOpen=false;document.getElementById('emojiPicker').style.display='none';};
document.addEventListener('click',e=>{
  if(emojiOpen&&!e.target.closest('#emojiPicker')&&!e.target.closest('.icon-btn')){emojiOpen=false;document.getElementById('emojiPicker').style.display='none';}
});
window.handleKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}};
window.autoResize=el=>{el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';};
window.openMobileSidebar=()=>{document.getElementById('sidebar').classList.add('open');document.getElementById('mobileOverlay').classList.add('show');};
window.closeMobileSidebar=()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('mobileOverlay').classList.remove('show');};

// ══════════════════════════════
// CALLING — Daily.co
// FIX: iOS audio — use audioTrack constraints + resume AudioContext on join
// ══════════════════════════════
window.startCall=async type=>{
  if(callFrame){alert('Already in a call!');return;}
  callType=type; currentCallId=`call_${Date.now()}_${userId}`;
  const roomName=`${currentChannel}chats`;
  await set(ref(db,`calls/${currentChannel}/active`),{callId:currentCallId,callerId:userId,callerName:myName,callerBg:myBg,callerFg:myFg,type,roomName,status:'ringing',ts:Date.now()});
  showCallOverlay(type);
  document.getElementById('callStatusText').textContent='Calling...';
  callParticipants={};
  addParticipantBox('local',myName,myBg,myFg,type==='video');
  await joinDailyRoom(roomName,type);
  setTimeout(()=>{if(callFrame&&document.getElementById('callStatusText').textContent==='Calling...')endCall();},30000);
};

function listenForIncomingCalls(){
  onValue(ref(db,`calls/${currentChannel}/active`),snap=>{
    if(!snap.exists()){hideIncomingBanner();return;}
    const data=snap.val();if(!data)return;
    if(data.callerId!==userId&&!callFrame&&data.status==='ringing'){incomingCallData=data;showIncomingBanner(data);}
    if(data.callerId===userId&&data.status==='accepted'){document.getElementById('callStatusText').textContent='Connected';startCallTimer();}
    if(data.status==='ended'&&callFrame)endCall();
  });
}
function showIncomingBanner(data){
  document.getElementById('incCallerName').textContent=data.callerName;
  document.getElementById('incCallType').textContent=data.type==='video'?'📹 Video Call':'📞 Voice Call';
  const av=document.getElementById('incCallerAvatar');
  av.textContent=getInitials(data.callerName);av.style.background=data.callerBg||'#dbeafe';av.style.color=data.callerFg||'#1d4ed8';
  document.getElementById('incomingCallBanner').classList.add('show');
}
function hideIncomingBanner(){document.getElementById('incomingCallBanner').classList.remove('show');incomingCallData=null;}
window.acceptCall=async()=>{
  if(!incomingCallData)return;
  const data=incomingCallData;hideIncomingBanner();
  callType=data.type;
  await set(ref(db,`calls/${currentChannel}/active/status`),'accepted');
  showCallOverlay(data.type);
  document.getElementById('callStatusText').textContent='Connecting...';
  callParticipants={};
  addParticipantBox('local',myName,myBg,myFg,data.type==='video');
  await joinDailyRoom(data.roomName,data.type);
  startCallTimer();
};
window.declineCall=()=>hideIncomingBanner();

function addParticipantBox(id,name,bg,fg,isVideo){callParticipants[id]={name,bg,fg,videoOn:false,audioOn:true};renderParticipantBoxes();}
function renderParticipantBoxes(){
  const grid=document.getElementById('participantsGrid');
  const ids=Object.keys(callParticipants);
  const existingVideos={};
  ids.forEach(id=>{const box=document.getElementById(`pbox-${id}`);if(box){const vid=box.querySelector('video');if(vid&&vid.srcObject)existingVideos[id]=vid.srcObject;}});
  grid.innerHTML='';
  ids.forEach(id=>{
    const p=callParticipants[id],isLocal=id==='local';
    const sizeClass=ids.length===1?'large':(isLocal?'small':'large');
    const box=document.createElement('div');
    box.className=`participant-box ${sizeClass}`;box.id=`pbox-${id}`;
    box.innerHTML=`<div class="participant-avatar" id="pavatar-${id}" style="display:${p.videoOn?'none':'flex'}">
      <div class="av-circle" style="background:${p.bg};color:${p.fg}">${getInitials(p.name)}</div>
      <div class="av-name">${p.name}${isLocal?' (You)':''}</div>
    </div>
    <div class="participant-name-tag">${p.name}${isLocal?' (You)':''}${!p.audioOn?' 🔇':''}</div>`;
    if(existingVideos[id]&&p.videoOn){const vid=document.createElement('video');vid.autoplay=true;vid.playsInline=true;if(isLocal)vid.muted=true;vid.srcObject=existingVideos[id];box.prepend(vid);}
    grid.appendChild(box);
  });
}
function setVideoTrack(id,track){
  if(!callParticipants[id])return;
  callParticipants[id].videoOn=true;
  const av=document.getElementById(`pavatar-${id}`);if(av)av.style.display='none';
  const box=document.getElementById(`pbox-${id}`);if(!box)return;
  let vid=box.querySelector('video');
  if(!vid){vid=document.createElement('video');vid.autoplay=true;vid.playsInline=true;if(id==='local')vid.muted=true;box.prepend(vid);}
  vid.srcObject=new MediaStream([track]);vid.play().catch(()=>{});
}
function clearVideoTrack(id){
  if(!callParticipants[id])return;
  callParticipants[id].videoOn=false;
  const av=document.getElementById(`pavatar-${id}`);if(av)av.style.display='flex';
  const box=document.getElementById(`pbox-${id}`);if(box){const vid=box.querySelector('video');if(vid)vid.srcObject=null;}
}

async function joinDailyRoom(roomName,type){
  if(callFrame){try{await callFrame.leave();callFrame.destroy();}catch(e){}callFrame=null;}
  const url=`https://${DAILY_DOMAIN}.daily.co/${roomName}`;
  try{
    // FIX: iOS audio — set audioSource true, use correct constraints
    callFrame=window.DailyIframe.createCallObject({
      audioSource:true,
      videoSource:type==='video',
      // FIX: prevent iOS from routing to earpiece by requesting speakerphone
      dailyConfig:{ experimentalChromeVideoMuteLightOff:true }
    });

    callFrame.on('track-started',e=>{
      const p=e.participant,sid=p.local?'local':p.session_id;
      if(e.track.kind==='audio'&&!p.local){
        // FIX: for iOS, attach to audio element with proper attributes
        let audio=document.getElementById(`audio-${sid}`);
        if(!audio){
          audio=document.createElement('audio');
          audio.id=`audio-${sid}`;
          audio.autoplay=true;
          audio.setAttribute('playsinline','');
          audio.setAttribute('webkit-playsinline','');
          // FIX: force speaker output on iOS
          if(typeof audio.setSinkId==='function'){audio.setSinkId('').catch(()=>{});}
          document.body.appendChild(audio);
        }
        const stream=audio.srcObject instanceof MediaStream?audio.srcObject:new MediaStream();
        stream.addTrack(e.track);audio.srcObject=stream;
        // FIX: must call play() explicitly on iOS after user gesture
        audio.play().catch(()=>{});
      }
      if(e.track.kind==='video')setVideoTrack(sid,e.track);
    });

    callFrame.on('track-stopped',e=>{const sid=e.participant.local?'local':e.participant.session_id;if(e.track.kind==='video')clearVideoTrack(sid);});
    callFrame.on('participant-joined',e=>{
      const p=e.participant;if(p.local)return;
      document.getElementById('callStatusText').textContent='Connected';startCallTimer();
      const pd=Object.values(onlineUsers).find(u=>u.name===p.user_name);
      addParticipantBox(p.session_id,p.user_name||'Guest',pd?.bg||'#dbeafe',pd?.fg||'#1d4ed8',type==='video');
      if(p.tracks?.video?.persistentTrack)setVideoTrack(p.session_id,p.tracks.video.persistentTrack);
    });
    callFrame.on('participant-updated',e=>{
      const p=e.participant;if(p.local)return;const sid=p.session_id;
      if(p.tracks?.video?.state==='playable'&&p.tracks?.video?.persistentTrack)setVideoTrack(sid,p.tracks.video.persistentTrack);
      else if(p.tracks?.video?.state==='off'||p.tracks?.video?.state==='interrupted')clearVideoTrack(sid);
      if(p.tracks?.screenVideo?.state==='playable'&&p.tracks?.screenVideo?.persistentTrack){
        if(!callParticipants[sid+'-screen'])addParticipantBox(sid+'-screen',p.user_name+' screen','#1e293b','#94a3b8',true);
        setVideoTrack(sid+'-screen',p.tracks.screenVideo.persistentTrack);
      } else if(callParticipants[sid+'-screen']){delete callParticipants[sid+'-screen'];document.getElementById(`pbox-${sid}-screen`)?.remove();renderParticipantBoxes();}
      if(callParticipants[sid]){
        callParticipants[sid].audioOn=p.tracks?.audio?.state==='playable';
        const tag=document.querySelector(`#pbox-${sid} .participant-name-tag`);
        if(tag)tag.textContent=callParticipants[sid].name+(!callParticipants[sid].audioOn?' 🔇':'');
      }
    });
    callFrame.on('participant-left',e=>{
      const sid=e.participant.session_id;
      delete callParticipants[sid];delete callParticipants[sid+'-screen'];
      renderParticipantBoxes();document.getElementById(`audio-${sid}`)?.remove();
      if(Object.keys(callParticipants).filter(k=>k!=='local').length===0){document.getElementById('callStatusText').textContent='Other person left';setTimeout(endCall,2000);}
    });
    callFrame.on('error',e=>{console.error('Daily error',e);endCall();});
    await callFrame.join({url,userName:myName});
    if(type==='video'){const parts=callFrame.participants();const lv=parts.local?.tracks?.video?.persistentTrack;if(lv)setVideoTrack('local',lv);}
  }catch(err){console.error('Call error:',err);alert(`Could not start call: ${err.message||JSON.stringify(err)}`);endCall();}
}

function showCallOverlay(type){
  document.getElementById('callOverlay').classList.add('show');
  document.getElementById('camBtn').style.display=type==='video'?'flex':'none';
  document.getElementById('screenBtn').style.display=(!isMobile&&type==='video')?'flex':'none';
}
window.endCall=()=>{
  if(currentCallId){
    set(ref(db,`calls/${currentChannel}/active/status`),'ended')
      .then(()=>setTimeout(()=>remove(ref(db,`calls/${currentChannel}/active`)),2000));
    currentCallId=null;
  }
  if(callFrame){try{callFrame.leave();callFrame.destroy();}catch(e){}callFrame=null;}
  if(callTimerInterval){clearInterval(callTimerInterval);callTimerInterval=null;callSeconds=0;}
  isMuted=false;isCamOff=false;isSharingScreen=false;callParticipants={};
  document.getElementById('callOverlay').classList.remove('show');
  document.getElementById('callTimer').style.display='none';
  document.getElementById('participantsGrid').innerHTML='';
  document.querySelectorAll('audio[id^="audio-"]').forEach(a=>a.remove());
  updateCtrlUI();
};
function startCallTimer(){
  if(callTimerInterval)return;
  const el=document.getElementById('callTimer');
  el.style.display='block';callSeconds=0;
  callTimerInterval=setInterval(()=>{callSeconds++;const m=Math.floor(callSeconds/60),s=(callSeconds%60).toString().padStart(2,'0');el.textContent=`${m}:${s}`;},1000);
}
window.toggleMute=()=>{if(!callFrame)return;isMuted=!isMuted;callFrame.setLocalAudio(!isMuted);updateCtrlUI();};
window.toggleCamera=()=>{
  if(!callFrame)return;isCamOff=!isCamOff;callFrame.setLocalVideo(!isCamOff);
  if(isCamOff)clearVideoTrack('local');
  else setTimeout(()=>{const parts=callFrame.participants();const t=parts.local?.tracks?.video?.persistentTrack;if(t)setVideoTrack('local',t);},500);
  updateCtrlUI();
};
window.toggleScreenShare=async()=>{
  if(!callFrame)return;
  try{if(!isSharingScreen){await callFrame.startScreenShare();isSharingScreen=true;}else{await callFrame.stopScreenShare();isSharingScreen=false;}updateCtrlUI();}catch(e){console.error(e);}
};
function updateCtrlUI(){
  const mb=document.getElementById('muteBtn'),cb=document.getElementById('camBtn'),sb=document.getElementById('screenBtn');
  mb.textContent=isMuted?'🔇':'🎤';mb.classList.toggle('active',isMuted);
  cb.textContent=isCamOff?'🚫':'📷';cb.classList.toggle('active',isCamOff);
  sb.classList.toggle('screen-active',isSharingScreen);
}

renderLoginColors();
checkSavedLogin();
