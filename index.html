<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f7f7f5;--bg3:#efefec;--sidebar-bg:#f2f1ee;--text:#111;--text2:#666;--text3:#999;--border:#e4e3de;--accent:#2563eb;--accent-light:#eff4ff;--bubble-out:#2563eb;--bubble-out-text:#fff;--bubble-in:#efefec;--bubble-in-text:#111;--font:'DM Sans',sans-serif;--radius:14px;--input-bg:#f2f1ee;}
[data-theme="dark"]{--bg:#1a1a1a;--bg2:#222;--bg3:#2a2a2a;--sidebar-bg:#141414;--text:#f0efe9;--text2:#aaa;--text3:#666;--border:#333;--accent:#4f8ef5;--accent-light:#1a2540;--bubble-out:#4f8ef5;--bubble-out-text:#fff;--bubble-in:#2a2a2a;--bubble-in-text:#f0efe9;--input-bg:#2a2a2a;}
[data-theme="discord"]{--bg:#313338;--bg2:#2b2d31;--bg3:#232428;--sidebar-bg:#2b2d31;--text:#dbdee1;--text2:#949ba4;--text3:#6d6f78;--border:#3a3c40;--accent:#5865f2;--accent-light:#2c2e45;--bubble-out:#5865f2;--bubble-out-text:#fff;--bubble-in:#383a40;--bubble-in-text:#dbdee1;--input-bg:#383a40;}
[data-theme="gamer"]{--bg:#0d0d0d;--bg2:#111;--bg3:#161616;--sidebar-bg:#0a0a0a;--text:#e0ffe0;--text2:#7aab7a;--text3:#3d6b3d;--border:#1a2a1a;--accent:#00ff88;--accent-light:#001a0d;--bubble-out:#00ff88;--bubble-out-text:#000;--bubble-in:#161616;--bubble-in-text:#e0ffe0;--input-bg:#111;}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;font-size:14px;transition:background .2s,color .2s}
.app{display:flex;height:100vh;overflow:hidden}

/* Login screen */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;width:300px;display:flex;flex-direction:column;gap:14px}
.login-box h2{font-size:18px;font-weight:600;color:var(--text)}
.login-box p{font-size:13px;color:var(--text2)}
.login-input{padding:10px 12px;border-radius:9px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-family:var(--font);font-size:14px;outline:none;width:100%}
.login-input:focus{border-color:var(--accent)}
.login-btn{padding:10px;background:var(--accent);border:none;border-radius:9px;color:#fff;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;width:100%}
.login-btn:hover{opacity:.87}
.sidebar{width:220px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px 14px 12px;border-bottom:1px solid var(--border)}
.sidebar-header h2{font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text2)}
.channel-list{flex:1;overflow-y:auto;padding:8px 0}
.channel{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:6px;margin:1px 6px;cursor:pointer;color:var(--text2);font-size:13.5px;transition:background .12s,color .12s;user-select:none}
.channel:hover{background:var(--bg3);color:var(--text)}
.channel.active{background:var(--accent-light);color:var(--accent);font-weight:500}
.unread-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:99px;min-width:18px;text-align:center}
.sidebar-footer{padding:10px;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:8px}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.username{font-size:13px;font-weight:500;color:var(--text)}
.user-status{font-size:11px;color:var(--text3)}
.settings-btn{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:4px;border-radius:6px;transition:background .12s}
.settings-btn:hover{background:var(--bg3);color:var(--text)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg);flex-shrink:0}
.chat-header-name{font-weight:600;font-size:15px}
.chat-header-desc{font-size:12px;color:var(--text3);margin-left:auto}
.online-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:4px}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:3px;background:var(--bg)}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.day-divider{display:flex;align-items:center;gap:10px;margin:10px 0;color:var(--text3);font-size:11px}
.day-divider::before,.day-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.msg-group{display:flex;flex-direction:column;gap:2px;margin:4px 0}
.msg-row{display:flex;align-items:flex-end;gap:8px}
.msg-row.out{flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;margin-bottom:2px}
.msg-row.continuation .msg-avatar{visibility:hidden}
.msg-content{display:flex;flex-direction:column;max-width:72%}
.msg-row.out .msg-content{align-items:flex-end}
.msg-sender{font-size:11px;color:var(--text3);margin-bottom:2px;padding-left:2px}
.bubble{padding:9px 13px;border-radius:var(--radius);font-size:13.5px;line-height:1.5;word-break:break-word}
.bubble.in{background:var(--bubble-in);color:var(--bubble-in-text);border-bottom-left-radius:4px}
.bubble.out{background:var(--bubble-out);color:var(--bubble-out-text);border-bottom-right-radius:4px}
.msg-row.continuation .bubble.in{border-top-left-radius:4px}
.msg-row.continuation .bubble.out{border-top-right-radius:4px}
.msg-meta{display:flex;align-items:center;gap:6px;margin-top:2px;padding:0 2px}
.msg-time{font-size:10.5px;color:var(--text3)}
.input-area{padding:12px 16px;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0}
.input-row{display:flex;align-items:flex-end;gap:8px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius);padding:6px 8px;transition:border-color .15s}
.input-row:focus-within{border-color:var(--accent)}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px 6px;border-radius:6px;font-size:16px;transition:color .12s,background .12s;position:relative}
.icon-btn:hover{color:var(--accent);background:var(--accent-light)}
.chat-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:13.5px;resize:none;min-height:22px;max-height:120px;line-height:1.5;padding:2px 4px}
.chat-input::placeholder{color:var(--text3)}
.send-btn{background:var(--accent);border:none;cursor:pointer;color:#fff;padding:6px 14px;border-radius:9px;font-size:13.5px;transition:opacity .12s;flex-shrink:0;font-family:var(--font);font-weight:500}
.send-btn:hover{opacity:.85}
.emoji-picker{position:absolute;bottom:calc(100% + 8px);left:0;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px;display:flex;gap:6px;flex-wrap:wrap;width:200px;box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:100}
.ep-emoji{font-size:20px;cursor:pointer;padding:4px;border-radius:6px;transition:background .1s}
.ep-emoji:hover{background:var(--bg3)}
.members-panel{width:180px;border-left:1px solid var(--border);background:var(--sidebar-bg);overflow-y:auto;flex-shrink:0;padding:12px 0}
.members-panel h3{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:0 12px 8px}
.member-row{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:6px;margin:1px 4px}
.member-name{font-size:13px;color:var(--text2)}
.member-dot{width:9px;height:9px;border-radius:50%;background:#22c55e;flex-shrink:0;margin-left:auto}
.typing-indicator{display:flex;align-items:center;gap:6px;padding:4px 2px;min-height:20px;font-size:12px;color:var(--text3)}
.typing-dots{display:flex;gap:3px}
.typing-dot{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:bounce 1.2s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity .15s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg);border-radius:16px;border:1px solid var(--border);padding:24px;width:320px;transform:translateY(8px);transition:transform .15s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal h2{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--text)}
.setting-group{margin-bottom:16px}
.setting-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;display:block}
.theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.theme-btn{padding:8px 10px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg2);cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;color:var(--text2);transition:all .12s;text-align:left}
.theme-btn:hover,.theme-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.color-swatches{display:flex;gap:6px;flex-wrap:wrap}
.color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .1s}
.close-btn{width:100%;padding:9px;background:var(--accent);border:none;border-radius:9px;color:#fff;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;margin-top:8px}
.conn-status{font-size:11px;padding:2px 8px;border-radius:99px;margin-left:8px}
.conn-online{background:#dcfce7;color:#166534}
.conn-offline{background:#fee2e2;color:#991b1b}

/* ── CALL BUTTONS in header ── */
.call-btn{background:none;border:none;cursor:pointer;padding:6px 8px;border-radius:8px;font-size:18px;transition:background .12s,transform .1s;color:var(--text2)}
.call-btn:hover{background:var(--bg3);transform:scale(1.1);color:var(--text)}
.call-btn:active{transform:scale(.95)}
.header-call-group{display:flex;align-items:center;gap:2px;margin-left:auto;margin-right:8px}

/* ── INCOMING CALL BANNER ── */
.incoming-call-banner{position:fixed;top:16px;right:16px;background:var(--bg);border:1.5px solid var(--border);border-radius:16px;padding:16px 18px;box-shadow:0 8px 32px rgba(0,0,0,.18);z-index:8000;min-width:260px;display:none;animation:slideIn .25s ease}
.incoming-call-banner.show{display:block}
@keyframes slideIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.inc-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:6px}
.inc-caller{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.inc-type{font-size:12px;color:var(--text2);margin-bottom:14px}
.inc-actions{display:flex;gap:8px}
.inc-accept{flex:1;padding:8px;border-radius:9px;border:none;background:#22c55e;color:#fff;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:opacity .12s}
.inc-accept:hover{opacity:.85}
.inc-decline{flex:1;padding:8px;border-radius:9px;border:none;background:#ef4444;color:#fff;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:opacity .12s}
.inc-decline:hover{opacity:.85}

/* ── ACTIVE CALL OVERLAY ── */
.call-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.call-overlay.show{display:flex}
.call-video-grid{display:flex;gap:16px;align-items:center;justify-content:center;flex-wrap:wrap;width:100%;max-width:900px;padding:0 16px}
.video-box{position:relative;border-radius:14px;overflow:hidden;background:#1a1a1a;border:1px solid #333}
.video-box.remote{width:min(560px,80vw);aspect-ratio:16/9}
.video-box.local{width:min(180px,28vw);aspect-ratio:16/9;position:absolute;bottom:80px;right:24px}
.video-box video{width:100%;height:100%;object-fit:cover;display:block}
.video-label{position:absolute;bottom:8px;left:10px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;font-weight:500;padding:2px 8px;border-radius:99px}
.video-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px;background:#1e1e2e}
.call-status-text{color:#fff;font-size:14px;opacity:.7;margin-top:4px}
.call-timer{color:#fff;font-size:22px;font-weight:600;letter-spacing:.04em}
.call-controls{display:flex;gap:14px;align-items:center;margin-top:8px}
.ctrl-btn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:transform .12s,opacity .12s}
.ctrl-btn:hover{transform:scale(1.08)}
.ctrl-btn.mute{background:#fff2;color:#fff}
.ctrl-btn.mute.active{background:#ef4444;color:#fff}
.ctrl-btn.cam{background:#fff2;color:#fff}
.ctrl-btn.cam.active{background:#ef4444;color:#fff}
.ctrl-btn.screen{background:#fff2;color:#fff}
.ctrl-btn.screen.active{background:#3b82f6;color:#fff}
.ctrl-btn.end{background:#ef4444;color:#fff;width:60px;height:60px;font-size:22px}
.ctrl-btn.end:hover{opacity:.85;transform:scale(1.04)}

/* ── CALL RINGING ANIMATION ── */
@keyframes pulse-ring{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.5);opacity:0}}
.ringing-avatar{position:relative;width:80px;height:80px;margin:0 auto 8px}
.ringing-avatar .ring{position:absolute;inset:-8px;border-radius:50%;border:2px solid #22c55e;animation:pulse-ring 1.4s ease-out infinite}
.ringing-avatar .ring:nth-child(2){animation-delay:.5s}

/* ── MOBILE ── */
@media(max-width:600px){
  .sidebar{position:fixed;left:-220px;top:0;bottom:0;z-index:500;transition:left .22s}
  .sidebar.open{left:0;box-shadow:4px 0 24px rgba(0,0,0,.18)}
  .members-panel{display:none}
  .mobile-menu-btn{display:flex!important}
  .video-box.local{width:100px;bottom:70px;right:12px}
  .call-controls{gap:10px}
  .ctrl-btn{width:44px;height:44px;font-size:17px}
  .ctrl-btn.end{width:52px;height:52px}
}
.mobile-menu-btn{display:none;background:none;border:none;cursor:pointer;font-size:20px;color:var(--text2);padding:4px 6px;border-radius:6px}
.mobile-overlay{display:none;position:fixed;inset:0;z-index:499;background:rgba(0,0,0,.3)}
.mobile-overlay.show{display:block}
</style>
</head>
<body>

<!-- Login screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>👋 Welcome to Chat</h2>
    <p>Enter a nickname to start chatting with real people!</p>
    <input class="login-input" id="loginName" placeholder="Your nickname..." maxlength="20" onkeydown="if(event.key==='Enter')joinChat()" />
    <div style="display:flex;gap:6px;flex-wrap:wrap" id="loginColors"></div>
    <button class="login-btn" onclick="joinChat()">Join Chat</button>
  </div>
</div>

<!-- Mobile sidebar overlay -->
<div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileSidebar()"></div>

<div class="app" id="appUI" style="display:none">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header"><h2># Channels</h2></div>
    <div class="channel-list" id="channelList"></div>
    <div class="sidebar-footer">
      <div class="user-row">
        <div class="avatar" id="myAvatar" style="background:#dbeafe;color:#1d4ed8">YO</div>
        <div>
          <div class="username" id="myNameDisplay">You</div>
          <div class="user-status"><span class="online-dot" style="width:6px;height:6px;margin-right:3px"></span>Online</div>
        </div>
        <button class="settings-btn" onclick="openSettings()">⚙</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="chat-header">
      <button class="mobile-menu-btn" onclick="openMobileSidebar()">☰</button>
      <span style="font-size:16px;color:var(--text2)">#</span>
      <span class="chat-header-name" id="chatTitle">general</span>
      <span class="conn-status conn-online" id="connStatus">● live</span>
      <!-- Call buttons -->
      <div class="header-call-group">
        <button class="call-btn" onclick="startCall('voice')" title="Voice call">📞</button>
        <button class="call-btn" onclick="startCall('video')" title="Video call">📹</button>
      </div>
      <span class="chat-header-desc" id="onlineCount"></span>
    </div>
    <div class="messages" id="messages"></div>
    <div style="padding:0 16px 2px"><div class="typing-indicator" id="typingIndicator"></div></div>
    <div class="input-area">
      <div class="input-row">
        <div style="position:relative">
          <button class="icon-btn" onclick="toggleEmojiPicker()">😊</button>
          <div class="emoji-picker" id="emojiPicker" style="display:none"></div>
        </div>
        <textarea class="chat-input" id="chatInput" placeholder="Message #general..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this);handleTyping()"></textarea>
        <button class="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <div class="members-panel" id="membersPanel"></div>
</div>

<!-- Incoming call banner -->
<div class="incoming-call-banner" id="incomingCallBanner">
  <div class="inc-title">Incoming Call</div>
  <div class="ringing-avatar">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="avatar" id="incCallerAvatar" style="width:80px;height:80px;font-size:22px;border-radius:50%;background:#dbeafe;color:#1d4ed8;display:flex;align-items:center;justify-content:center;font-weight:700"></div>
  </div>
  <div class="inc-caller" id="incCallerName"></div>
  <div class="inc-type" id="incCallType"></div>
  <div class="inc-actions">
    <button class="inc-accept" onclick="acceptCall()">✅ Accept</button>
    <button class="inc-decline" onclick="declineCall()">✖ Decline</button>
  </div>
</div>

<!-- Active call overlay -->
<div class="call-overlay" id="callOverlay">
  <div style="position:relative;width:100%;max-width:900px">
    <div class="call-video-grid" id="callVideoGrid">
      <!-- videos injected here -->
    </div>
    <div class="video-box local" id="localVideoBox" style="display:none">
      <video id="localVideo" autoplay muted playsinline></video>
      <div class="video-label">You</div>
    </div>
  </div>
  <div class="call-status-text" id="callStatusText">Calling...</div>
  <div class="call-timer" id="callTimer" style="display:none">0:00</div>
  <div class="call-controls">
    <button class="ctrl-btn mute" id="muteBtn" onclick="toggleMute()" title="Mute">🎤</button>
    <button class="ctrl-btn cam" id="camBtn" onclick="toggleCamera()" title="Camera">📷</button>
    <button class="ctrl-btn screen" id="screenBtn" onclick="toggleScreenShare()" title="Share screen">🖥</button>
    <button class="ctrl-btn end" onclick="endCall()" title="End call">📵</button>
  </div>
</div>

<!-- Settings -->
<div class="modal-overlay" id="settingsModal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2>⚙ Settings</h2>
    <div class="setting-group">
      <span class="setting-label">Theme</span>
      <div class="theme-grid">
        <button class="theme-btn active" onclick="setTheme('',this)">☀ Modern</button>
        <button class="theme-btn" onclick="setTheme('dark',this)">🌙 Dark</button>
        <button class="theme-btn" onclick="setTheme('discord',this)">💬 Discord</button>
        <button class="theme-btn" onclick="setTheme('gamer',this)">🎮 Gamer</button>
      </div>
    </div>
    <div class="setting-group">
      <span class="setting-label">Avatar color</span>
      <div class="color-swatches" id="colorSwatches"></div>
    </div>
    <button class="close-btn" onclick="closeSettings()">Done</button>
  </div>
</div>

<!-- Daily.co SDK -->
<script crossorigin src="https://unpkg.com/@daily-co/daily-js@0.70.0/dist/daily-iframe.js"></script>

<!-- Firebase -->
<script type="module">

import { getDatabase, ref, push, onChildAdded, onValue, set, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  apiKey: "AIzaSyBROTXo_86kA1i29WyFBowDXwIKPC2Ddmw",
  authDomain: "chats-b0699.firebaseapp.com",
  databaseURL: "https://chats-b0699-default-rtdb.firebaseio.com",
  projectId: "chats-b0699",
  storageBucket: "chats-b0699.firebasestorage.app",
  messagingSenderId: "399848929770",
  appId: "1:399848929770:web:f8b5630dc2121737cdda93",
  measurementId: "G-1L8TL72PTT"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const channels = ['general','random','tech-talk','off-topic'];
const avatarColors = [
  {bg:'#dbeafe',fg:'#1d4ed8'},{bg:'#dcfce7',fg:'#166534'},
  {bg:'#fce7f3',fg:'#9d174d'},{bg:'#fef9c3',fg:'#854d0e'},
  {bg:'#f3e8ff',fg:'#6b21a8'},{bg:'#ffe4e6',fg:'#9f1239'},
];
const emojis = ['👍','❤️','😂','😮','😢','🎉','🔥','✅','👏','🙌'];

let myName = '';
let myBg = '#dbeafe';
let myFg = '#1d4ed8';
let selectedColorIdx = 0;
let currentChannel = 'general';
let emojiOpen = false;
let typingTimer = null;
let userId = 'user_' + Math.random().toString(36).slice(2,9);
let onlineUsers = {};
let presenceInterval = null;
let messageListeners = {};

// ── CALL STATE ──
let callFrame = null;
let localStream = null;
let currentCallId = null;
let callTimerInterval = null;
let callSeconds = 0;
let isMuted = false;
let isCamOff = false;
let isSharingScreen = false;
let incomingCallData = null;
let callSignalListener = null;

function getInitials(n){ return n.slice(0,2).toUpperCase(); }
function nowTime(){
  const d=new Date(),h=d.getHours()%12||12,m=d.getMinutes().toString().padStart(2,'0');
  return `${h}:${m} ${d.getHours()<12?'AM':'PM'}`;
}

// ── LOGIN ──
function renderLoginColors(){
  document.getElementById('loginColors').innerHTML = avatarColors.map((c,i)=>
    `<div style="width:26px;height:26px;border-radius:50%;background:${c.bg};border:2px solid ${i===0?c.fg:'transparent'};cursor:pointer" onclick="selectLoginColor(${i},this)"></div>`
  ).join('');
}
window.selectLoginColor = function(idx,el){
  selectedColorIdx=idx; myBg=avatarColors[idx].bg; myFg=avatarColors[idx].fg;
  document.querySelectorAll('#loginColors div').forEach((d,i)=>{
    d.style.borderColor = i===idx ? avatarColors[idx].fg : 'transparent';
  });
};
window.joinChat = function(){
  const name = document.getElementById('loginName').value.trim();
  if(!name){ document.getElementById('loginName').focus(); return; }
  myName = name;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appUI').style.display = 'flex';
  document.getElementById('myNameDisplay').textContent = myName;
  document.getElementById('myAvatar').textContent = getInitials(myName);
  document.getElementById('myAvatar').style.background = myBg;
  document.getElementById('myAvatar').style.color = myFg;
  startPresence();
  renderChannels();
  renderColorSwatches();
  listenToChannel(currentChannel);
  listenToOnlineUsers();
  listenForIncomingCalls();
};

// ── PRESENCE ──
function startPresence(){
  updatePresence();
  presenceInterval = setInterval(updatePresence, 15000);
  window.addEventListener('beforeunload', removePresence);
}
function updatePresence(){
  set(ref(db, `presence/${currentChannel}/${userId}`), {
    name: myName, bg: myBg, fg: myFg, ts: Date.now()
  });
}
function removePresence(){
  remove(ref(db, `presence/${currentChannel}/${userId}`));
}
function listenToOnlineUsers(){
  onValue(ref(db, `presence/${currentChannel}`), snap => {
    onlineUsers = {};
    const now = Date.now();
    snap.forEach(child => {
      const d = child.val();
      if(now - d.ts < 30000) onlineUsers[child.key] = d;
    });
    renderMembers();
    document.getElementById('onlineCount').innerHTML =
      `<span class="online-dot"></span>${Object.keys(onlineUsers).length} online`;
  });
}

// ── CHANNELS ──
function renderChannels(){
  document.getElementById('channelList').innerHTML = channels.map(c=>
    `<div class="channel ${c===currentChannel?'active':''}" onclick="window.switchChannel('${c}')">
      <span style="opacity:.7">#</span><span>${c}</span>
    </div>`).join('');
}
window.switchChannel = function(ch){
  removePresence();
  currentChannel = ch;
  document.getElementById('chatTitle').textContent = ch;
  document.getElementById('chatInput').placeholder = `Message #${ch}...`;
  document.getElementById('messages').innerHTML = '';
  renderChannels();
  updatePresence();
  listenToChannel(ch);
  listenToOnlineUsers();
  closeMobileSidebar();
};

// ── MESSAGES ──
function listenToChannel(ch){
  if(messageListeners[ch]) return;
  messageListeners[ch] = true;
  onChildAdded(ref(db, `messages/${ch}`), snap => {
    if(ch !== currentChannel) return;
    appendMessage(snap.val());
  });
}
function appendMessage(msg){
  const container = document.getElementById('messages');
  const isOut = msg.name === myName;
  const rows = container.querySelectorAll('.msg-row');
  const lastRow = rows[rows.length-1];
  const lastFrom = lastRow ? lastRow.dataset.from : '';
  const isCont = lastFrom === msg.name;
  const bg = isOut ? myBg : (msg.bg || '#e5e7eb');
  const fg = isOut ? myFg : (msg.fg || '#374151');
  const div = document.createElement('div');
  div.className = 'msg-group';
  div.innerHTML = `
    <div class="msg-row ${isOut?'out':''} ${isCont?'continuation':''}" data-from="${msg.name}">
      <div class="msg-avatar" style="background:${bg};color:${fg}">${getInitials(msg.name)}</div>
      <div class="msg-content">
        ${!isCont&&!isOut?`<div class="msg-sender">${msg.name}</div>`:''}
        <div class="bubble ${isOut?'out':'in'}">${escapeHtml(msg.text)}</div>
        <div class="msg-meta"><span class="msg-time">${msg.time}</span></div>
      </div>
    </div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}
function escapeHtml(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
window.sendMessage = function(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;
  push(ref(db, `messages/${currentChannel}`), {
    name: myName, text, time: nowTime(), bg: myBg, fg: myFg, ts: Date.now()
  });
  input.value='';
  autoResize(input);
  clearTypingIndicator();
};

// ── TYPING ──
window.handleTyping = function(){
  set(ref(db, `typing/${currentChannel}/${userId}`), {name:myName, ts:Date.now()});
  clearTimeout(typingTimer);
  typingTimer = setTimeout(clearTypingIndicator, 2000);
};
function clearTypingIndicator(){
  remove(ref(db, `typing/${currentChannel}/${userId}`));
}
setTimeout(()=>{
  onValue(ref(db, `typing/${currentChannel}`), snap => {
    const typers = [];
    const now = Date.now();
    snap.forEach(child => {
      const d = child.val();
      if(child.key !== userId && now - d.ts < 3000) typers.push(d.name);
    });
    const el = document.getElementById('typingIndicator');
    if(typers.length){
      el.innerHTML=`<div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div><span>${typers.join(', ')} ${typers.length>1?'are':'is'} typing...</span>`;
    } else { el.innerHTML=''; }
  });
}, 500);

// ── MEMBERS ──
function renderMembers(){
  const users = Object.values(onlineUsers);
  document.getElementById('membersPanel').innerHTML =
    `<h3>Online — ${users.length}</h3>` +
    users.map(u=>`<div class="member-row">
      <div class="avatar" style="width:26px;height:26px;font-size:9px;background:${u.bg||'#dbeafe'};color:${u.fg||'#1d4ed8'}">${getInitials(u.name)}</div>
      <span class="member-name">${u.name}</span>
      <div class="member-dot"></div>
    </div>`).join('');
}

// ══════════════════════════════════════════════════
// ── CALLING SYSTEM ──
// Uses Daily.co for WebRTC + Firebase for signaling
// ══════════════════════════════════════════════════

// DAILY.CO SETUP
// You need a free Daily.co account at daily.co
// Then create a room and get your domain name
// Replace 'YOUR-DAILY-DOMAIN' below with your actual domain e.g. 'myapp'
const DAILY_DOMAIN = 'schoolchats'; // <-- CHANGE THIS

// Generate a room name from channel
function getRoomName(ch){ return `chat-${ch}-room`; }

// ── START A CALL (caller side) ──
window.startCall = async function(type){
  if(!window.DailyIframe){ alert('Daily.co SDK not loaded. Check your internet connection.'); return; }
  if(callFrame){ alert('You are already in a call!'); return; }

  const callId = `call_${Date.now()}_${userId}`;
  currentCallId = callId;
  const roomName = getRoomName(currentChannel);

  // Signal to everyone in the channel via Firebase
  set(ref(db, `calls/${currentChannel}/active`), {
    callId,
    callerId: userId,
    callerName: myName,
    callerBg: myBg,
    callerFg: myFg,
    type,           // 'voice' or 'video'
    roomName,
    status: 'ringing',
    ts: Date.now()
  });

  // Show call overlay immediately for caller
  showCallOverlay(type, true, myName);
  document.getElementById('callStatusText').textContent = 'Calling channel members...';

  // Join the Daily.co room
  await joinDailyRoom(roomName, type, true);

  // Auto-cancel if no answer in 30s
  setTimeout(()=>{
    if(callFrame && document.getElementById('callStatusText').textContent.includes('Calling')){
      endCall();
    }
  }, 30000);
};

// ── LISTEN FOR INCOMING CALLS ──
function listenForIncomingCalls(){
  if(callSignalListener) return;
  callSignalListener = true;
  onValue(ref(db, `calls/${currentChannel}/active`), snap => {
    if(!snap.exists()){ hideIncomingBanner(); return; }
    const data = snap.val();
    if(!data) return;

    // Not our own call, not already in a call, status is ringing
    if(data.callerId !== userId && !callFrame && data.status === 'ringing'){
      incomingCallData = data;
      showIncomingBanner(data);
    }

    // Callee accepted — caller gets notified
    if(data.callerId === userId && data.status === 'accepted'){
      document.getElementById('callStatusText').textContent = 'Connected!';
      startCallTimer();
    }

    // Call ended from other side
    if(data.status === 'ended' && callFrame){
      endCall();
    }
  });
}

// ── SHOW INCOMING CALL BANNER ──
function showIncomingBanner(data){
  const banner = document.getElementById('incomingCallBanner');
  document.getElementById('incCallerName').textContent = data.callerName;
  document.getElementById('incCallType').textContent = data.type === 'video' ? '📹 Video Call' : '📞 Voice Call';
  const av = document.getElementById('incCallerAvatar');
  av.textContent = getInitials(data.callerName);
  av.style.background = data.callerBg || '#dbeafe';
  av.style.color = data.callerFg || '#1d4ed8';
  banner.classList.add('show');
}
function hideIncomingBanner(){
  document.getElementById('incomingCallBanner').classList.remove('show');
  incomingCallData = null;
}

// ── ACCEPT CALL ──
window.acceptCall = async function(){
  if(!incomingCallData) return;
  const data = incomingCallData;
  hideIncomingBanner();

  // Update status in Firebase
  set(ref(db, `calls/${currentChannel}/active/status`), 'accepted');

  showCallOverlay(data.type, false, data.callerName);
  document.getElementById('callStatusText').textContent = 'Connecting...';
  await joinDailyRoom(data.roomName, data.type, false);
  startCallTimer();
};

// ── DECLINE CALL ──
window.declineCall = function(){
  hideIncomingBanner();
  incomingCallData = null;
};

// ── JOIN DAILY ROOM ──
async function joinDailyRoom(roomName, type, isHost){
  const url = `https://${DAILY_DOMAIN}.daily.co/${roomName}`;

  try {
    // Get local media first
    const constraints = { audio: true, video: type === 'video' };
    localStream = await navigator.mediaDevices.getUserMedia(constraints);

    if(type === 'video'){
      document.getElementById('localVideoBox').style.display = 'block';
      document.getElementById('localVideo').srcObject = localStream;
    }

    // Create Daily iframe (hidden — we manage our own UI)
    callFrame = window.DailyIframe.createCallObject({
      audioSource: localStream.getAudioTracks()[0],
      videoSource: type === 'video' ? localStream.getVideoTracks()[0] : false,
    });

    callFrame.on('participant-joined', handleParticipantJoined);
    callFrame.on('participant-updated', handleParticipantUpdated);
    callFrame.on('participant-left', handleParticipantLeft);
    callFrame.on('error', (e)=>{ console.error('Daily error:', e); endCall(); });

    await callFrame.join({ url });

    if(DAILY_DOMAIN === 'YOUR-DAILY-DOMAIN'){
      // Demo mode: show placeholder when domain not configured
      document.getElementById('callStatusText').textContent = '⚠ Set your Daily.co domain to connect';
    }

  } catch(err){
    console.error('Media/Daily error:', err);
    alert(`Could not start call: ${err.message}\n\nMake sure to allow microphone/camera access.`);
    endCall();
  }
}

function handleParticipantJoined(event){
  if(event.participant.local) return;
  document.getElementById('callStatusText').textContent = 'Connected';
  renderRemoteVideo(event.participant);
}
function handleParticipantUpdated(event){
  if(event.participant.local) return;
  renderRemoteVideo(event.participant);
}
function handleParticipantLeft(event){
  if(Object.keys(callFrame.participants()).length <= 1){
    document.getElementById('callStatusText').textContent = 'Other participant left';
    setTimeout(endCall, 2000);
  }
}
function renderRemoteVideo(participant){
  const grid = document.getElementById('callVideoGrid');
  let box = document.getElementById(`remote-${participant.session_id}`);
  if(!box){
    box = document.createElement('div');
    box.className = 'video-box remote';
    box.id = `remote-${participant.session_id}`;
    box.innerHTML = `<div class="video-placeholder">👤</div><div class="video-label">${participant.user_name||'Caller'}</div>`;
    grid.appendChild(box);
  }
  if(participant.tracks?.video?.persistentTrack){
    let vid = box.querySelector('video');
    if(!vid){ vid = document.createElement('video'); vid.autoplay = true; vid.playsInline = true; box.prepend(vid); }
    vid.srcObject = new MediaStream([participant.tracks.video.persistentTrack]);
    box.querySelector('.video-placeholder')?.remove();
  }
}

// ── SHOW CALL OVERLAY ──
function showCallOverlay(type, isCaller, otherName){
  const overlay = document.getElementById('callOverlay');
  overlay.classList.add('show');
  // Show screen share button only for video
  document.getElementById('screenBtn').style.display = type === 'video' ? 'flex' : 'none';
  document.getElementById('camBtn').style.display = type === 'video' ? 'flex' : 'none';
  // Remote placeholder
  const grid = document.getElementById('callVideoGrid');
  grid.innerHTML = `<div class="video-box remote" id="remote-placeholder">
    <div class="video-placeholder">${type==='video'?'📹':'📞'}</div>
    <div class="video-label">${isCaller ? 'Waiting...' : otherName}</div>
  </div>`;
}

// ── END CALL ──
window.endCall = function(){
  // Signal Firebase
  if(currentCallId){
    set(ref(db, `calls/${currentChannel}/active/status`), 'ended')
      .then(()=> setTimeout(()=> remove(ref(db, `calls/${currentChannel}/active`)), 2000));
    currentCallId = null;
  }
  // Cleanup
  if(callFrame){ callFrame.destroy(); callFrame = null; }
  if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream = null; }
  if(callTimerInterval){ clearInterval(callTimerInterval); callTimerInterval = null; callSeconds = 0; }
  isMuted = false; isCamOff = false; isSharingScreen = false;
  updateControlUI();
  document.getElementById('callOverlay').classList.remove('show');
  document.getElementById('callTimer').style.display = 'none';
  document.getElementById('localVideoBox').style.display = 'none';
  document.getElementById('callVideoGrid').innerHTML = '';
};

// ── CALL TIMER ──
function startCallTimer(){
  if(callTimerInterval) return;
  callSeconds = 0;
  document.getElementById('callTimer').style.display = 'block';
  callTimerInterval = setInterval(()=>{
    callSeconds++;
    const m = Math.floor(callSeconds/60);
    const s = (callSeconds%60).toString().padStart(2,'0');
    document.getElementById('callTimer').textContent = `${m}:${s}`;
  }, 1000);
}

// ── MUTE / CAM / SCREEN ──
window.toggleMute = function(){
  if(!callFrame) return;
  isMuted = !isMuted;
  callFrame.setLocalAudio(!isMuted);
  updateControlUI();
};
window.toggleCamera = function(){
  if(!callFrame) return;
  isCamOff = !isCamOff;
  callFrame.setLocalVideo(!isCamOff);
  updateControlUI();
};
window.toggleScreenShare = async function(){
  if(!callFrame) return;
  try {
    if(!isSharingScreen){
      await callFrame.startScreenShare();
      isSharingScreen = true;
    } else {
      await callFrame.stopScreenShare();
      isSharingScreen = false;
    }
    updateControlUI();
  } catch(e){ console.error('Screen share error:', e); }
};
function updateControlUI(){
  document.getElementById('muteBtn').classList.toggle('active', isMuted);
  document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🎤';
  document.getElementById('camBtn').classList.toggle('active', isCamOff);
  document.getElementById('camBtn').textContent = isCamOff ? '📵' : '📷';
  document.getElementById('screenBtn').classList.toggle('active', isSharingScreen);
}

// ── SETTINGS ──
window.openSettings = function(){ document.getElementById('settingsModal').classList.add('open'); };
window.closeSettings = function(){
  document.getElementById('settingsModal').classList.remove('open');
  updatePresence();
};
window.handleOverlayClick = function(e){ if(e.target===e.currentTarget) closeSettings(); };
window.setTheme = function(theme,btn){
  document.body.setAttribute('data-theme',theme);
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
};
window.setAvatarColor = function(idx){
  selectedColorIdx=idx;
  myBg=avatarColors[idx].bg; myFg=avatarColors[idx].fg;
  document.getElementById('myAvatar').style.background=myBg;
  document.getElementById('myAvatar').style.color=myFg;
  renderColorSwatches();
};
function renderColorSwatches(){
  document.getElementById('colorSwatches').innerHTML=avatarColors.map((c,i)=>
    `<div class="color-swatch" style="background:${c.bg};border-color:${i===selectedColorIdx?c.fg:'transparent'}" onclick="setAvatarColor(${i})"></div>`
  ).join('');
}

// ── EMOJI ──
window.toggleEmojiPicker = function(){
  emojiOpen=!emojiOpen;
  const p=document.getElementById('emojiPicker');
  if(emojiOpen){p.innerHTML=emojis.map(e=>`<span class="ep-emoji" onclick="insertEmoji('${e}')">${e}</span>`).join('');p.style.display='flex';}
  else p.style.display='none';
};
window.insertEmoji = function(e){
  const i=document.getElementById('chatInput');i.value+=e;i.focus();
  emojiOpen=false;document.getElementById('emojiPicker').style.display='none';
};
document.addEventListener('click',e=>{
  if(emojiOpen&&!e.target.closest('#emojiPicker')&&!e.target.closest('.icon-btn')){
    emojiOpen=false;document.getElementById('emojiPicker').style.display='none';
  }
});

// ── KEYBOARD + RESIZE ──
window.handleKey = function(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} };
window.autoResize = function(el){ el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'; };

// ── MOBILE SIDEBAR ──
window.openMobileSidebar = function(){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('mobileOverlay').classList.add('show');
};
window.closeMobileSidebar = function(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobileOverlay').classList.remove('show');
};

renderLoginColors();
</script>
