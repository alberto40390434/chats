<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f7f7f5;--bg3:#efefec;--sidebar-bg:#f2f1ee;--text:#111;--text2:#666;--text3:#999;--border:#e4e3de;--accent:#2563eb;--accent-light:#eff4ff;--bubble-out:#2563eb;--bubble-out-text:#fff;--bubble-in:#efefec;--bubble-in-text:#111;--font:'DM Sans',sans-serif;--radius:14px;--input-bg:#f2f1ee;}
[data-theme="dark"]{--bg:#1a1a1a;--bg2:#222;--bg3:#2a2a2a;--sidebar-bg:#141414;--text:#f0efe9;--text2:#aaa;--text3:#666;--border:#333;--accent:#4f8ef5;--accent-light:#1a2540;--bubble-out:#4f8ef5;--bubble-out-text:#fff;--bubble-in:#2a2a2a;--bubble-in-text:#f0efe9;--input-bg:#2a2a2a;}
[data-theme="discord"]{--bg:#313338;--bg2:#2b2d31;--bg3:#232428;--sidebar-bg:#2b2d31;--text:#dbdee1;--text2:#949ba4;--text3:#6d6f78;--border:#3a3c40;--accent:#5865f2;--accent-light:#2c2e45;--bubble-out:#5865f2;--bubble-out-text:#fff;--bubble-in:#383a40;--bubble-in-text:#dbdee1;--input-bg:#383a40;}
[data-theme="gamer"]{--bg:#0d0d0d;--bg2:#111;--bg3:#161616;--sidebar-bg:#0a0a0a;--text:#e0ffe0;--text2:#7aab7a;--text3:#3d6b3d;--border:#1a2a1a;--accent:#00ff88;--accent-light:#001a0d;--bubble-out:#00ff88;--bubble-out-text:#000;--bubble-in:#161616;--bubble-in-text:#e0ffe0;--input-bg:#111;}

body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;font-size:14px;transition:background .2s,color .2s}
.app{display:flex;height:100vh;overflow:hidden}

/* ── Login / Verify screens ── */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;width:320px;display:flex;flex-direction:column;gap:14px}
.login-box h2{font-size:18px;font-weight:600;color:var(--text)}
.login-box p{font-size:13px;color:var(--text2);line-height:1.5}
.login-input{padding:10px 12px;border-radius:9px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-family:var(--font);font-size:14px;outline:none;width:100%}
.login-input:focus{border-color:var(--accent)}
.login-btn{padding:10px;background:var(--accent);border:none;border-radius:9px;color:#fff;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;width:100%;transition:opacity .15s}
.login-btn:hover{opacity:.87}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-back{background:none;border:none;color:var(--text3);font-family:var(--font);font-size:13px;cursor:pointer;text-align:center;text-decoration:underline}
.login-back:hover{color:var(--text)}
.login-error{font-size:12px;color:#dc2626;background:#fee2e2;border-radius:8px;padding:8px 10px;display:none}
.login-error.show{display:block}
.login-success{font-size:12px;color:#166534;background:#dcfce7;border-radius:8px;padding:8px 10px;display:none}
.login-success.show{display:block}
.code-inputs{display:flex;gap:8px;justify-content:center}
.code-input{width:44px;height:52px;border-radius:10px;border:1.5px solid var(--border);background:var(--input-bg);color:var(--text);font-family:var(--font);font-size:22px;font-weight:600;text-align:center;outline:none;transition:border-color .15s}
.code-input:focus{border-color:var(--accent)}
.resend-row{display:flex;justify-content:center;gap:4px;font-size:12px;color:var(--text3)}
.resend-btn{background:none;border:none;color:var(--accent);font-family:var(--font);font-size:12px;cursor:pointer;padding:0}
.resend-btn:disabled{color:var(--text3);cursor:not-allowed}

/* ── Sidebar ── */
.sidebar{width:220px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px 14px 12px;border-bottom:1px solid var(--border)}
.sidebar-header h2{font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text2)}
.channel-list{flex:1;overflow-y:auto;padding:8px 0}
.channel{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:6px;margin:1px 6px;cursor:pointer;color:var(--text2);font-size:13.5px;transition:background .12s,color .12s;user-select:none}
.channel:hover{background:var(--bg3);color:var(--text)}
.channel.active{background:var(--accent-light);color:var(--accent);font-weight:500}
.sidebar-footer{padding:10px;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:8px}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.username{font-size:13px;font-weight:500;color:var(--text)}
.user-status{font-size:11px;color:var(--text3)}
.settings-btn{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:4px;border-radius:6px;transition:background .12s}
.settings-btn:hover{background:var(--bg3);color:var(--text)}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg);flex-shrink:0}
.chat-header-name{font-weight:600;font-size:15px}
.online-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:4px}
.header-call-btns{display:flex;gap:6px;margin-left:auto}
.call-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;color:var(--text2);transition:all .12s;white-space:nowrap}
.call-btn:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.call-btn.active{background:#dcfce7;border-color:#22c55e;color:#166534}
.chat-header-desc{font-size:12px;color:var(--text3)}
.conn-status{font-size:11px;padding:2px 8px;border-radius:99px}
.conn-online{background:#dcfce7;color:#166534}

.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:3px;background:var(--bg)}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.msg-group{display:flex;flex-direction:column;gap:2px;margin:4px 0}
.msg-row{display:flex;align-items:flex-end;gap:8px}
.msg-row.out{flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;margin-bottom:2px}
.msg-row.continuation .msg-avatar{visibility:hidden}
.msg-content{display:flex;flex-direction:column;max-width:72%}
.msg-row.out .msg-content{align-items:flex-end}
.msg-sender{font-size:11px;color:var(--text3);margin-bottom:2px;padding-left:2px}
.bubble{padding:9px 13px;border-radius:var(--radius);font-size:13.5px;line-height:1.5;word-break:break-word}
.bubble.in{background:var(--bubble-in);color:var(--bubble-in-text);border-bottom-left-radius:4px}
.bubble.out{background:var(--bubble-out);color:var(--bubble-out-text);border-bottom-right-radius:4px}
.msg-row.continuation .bubble.in{border-top-left-radius:4px}
.msg-row.continuation .bubble.out{border-top-right-radius:4px}
.msg-meta{display:flex;align-items:center;gap:6px;margin-top:2px;padding:0 2px}
.msg-time{font-size:10.5px;color:var(--text3)}

.input-area{padding:12px 16px;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0}
.input-row{display:flex;align-items:flex-end;gap:8px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius);padding:6px 8px;transition:border-color .15s}
.input-row:focus-within{border-color:var(--accent)}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px 6px;border-radius:6px;font-size:16px;transition:color .12s,background .12s;position:relative}
.icon-btn:hover{color:var(--accent);background:var(--accent-light)}
.chat-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:13.5px;resize:none;min-height:22px;max-height:120px;line-height:1.5;padding:2px 4px}
.chat-input::placeholder{color:var(--text3)}
.send-btn{background:var(--accent);border:none;cursor:pointer;color:#fff;padding:6px 14px;border-radius:9px;font-size:13.5px;transition:opacity .12s;flex-shrink:0;font-family:var(--font);font-weight:500}
.send-btn:hover{opacity:.85}
.emoji-picker{position:absolute;bottom:calc(100% + 8px);left:0;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px;display:flex;gap:6px;flex-wrap:wrap;width:200px;box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:100}
.ep-emoji{font-size:20px;cursor:pointer;padding:4px;border-radius:6px;transition:background .1s}
.ep-emoji:hover{background:var(--bg3)}

.members-panel{width:180px;border-left:1px solid var(--border);background:var(--sidebar-bg);overflow-y:auto;flex-shrink:0;padding:12px 0}
.members-panel h3{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:0 12px 8px}
.member-row{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:6px;margin:1px 4px}
.member-name{font-size:13px;color:var(--text2)}
.member-dot{width:9px;height:9px;border-radius:50%;background:#22c55e;flex-shrink:0;margin-left:auto}

.typing-indicator{display:flex;align-items:center;gap:6px;padding:4px 2px;min-height:20px;font-size:12px;color:var(--text3)}
.typing-dots{display:flex;gap:3px}
.typing-dot{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:bounce 1.2s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

/* ── Modals ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity .15s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg);border-radius:16px;border:1px solid var(--border);padding:24px;width:320px;transform:translateY(8px);transition:transform .15s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal h2{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--text)}
.setting-group{margin-bottom:16px}
.setting-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;display:block}
.theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.theme-btn{padding:8px 10px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg2);cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;color:var(--text2);transition:all .12s;text-align:left}
.theme-btn:hover,.theme-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.color-swatches{display:flex;gap:6px;flex-wrap:wrap}
.color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .1s}
.close-btn{width:100%;padding:9px;background:var(--accent);border:none;border-radius:9px;color:#fff;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;margin-top:8px}

/* Daily.co call modal */
.call-modal{background:var(--bg);border-radius:16px;border:1px solid var(--border);padding:0;width:min(760px,96vw);height:min(540px,88vh);transform:translateY(8px);transition:transform .15s;display:flex;flex-direction:column;overflow:hidden}
.modal-overlay.open .call-modal{transform:translateY(0)}
.call-modal-header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.call-modal-header h3{font-size:14px;font-weight:600;color:var(--text)}
.call-modal-header .ch-label{font-size:12px;color:var(--text3)}
.end-call-btn{margin-left:auto;display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;border:none;background:#fee2e2;color:#991b1b;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;transition:opacity .12s}
.end-call-btn:hover{opacity:.8}
#dailyFrame{flex:1;border:none;width:100%;background:#111}
</style>
</head>
<body>

<!-- ── Step 1: Nickname + Email ── -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>👋 Welcome to Chat</h2>
    <p>Enter your nickname and Gmail to receive a verification code.</p>
    <input class="login-input" id="loginName" placeholder="Your nickname..." maxlength="20" />
    <input class="login-input" id="loginEmail" type="email" placeholder="Your Gmail address..." />
    <div style="display:flex;gap:6px;flex-wrap:wrap" id="loginColors"></div>
    <div class="login-error" id="loginError"></div>
    <button class="login-btn" id="sendCodeBtn" onclick="sendVerificationCode()">Send Code to Gmail</button>
  </div>
</div>

<!-- ── Step 2: Enter Code ── -->
<div class="login-screen" id="verifyScreen" style="display:none">
  <div class="login-box">
    <h2>📬 Check your Gmail</h2>
    <p id="verifyDesc">We sent a 6-digit code to your email. Enter it below.</p>
    <div class="code-inputs">
      <input class="code-input" maxlength="1" id="c0" oninput="codeInput(this,0)" onkeydown="codeKey(event,0)" />
      <input class="code-input" maxlength="1" id="c1" oninput="codeInput(this,1)" onkeydown="codeKey(event,1)" />
      <input class="code-input" maxlength="1" id="c2" oninput="codeInput(this,2)" onkeydown="codeKey(event,2)" />
      <input class="code-input" maxlength="1" id="c3" oninput="codeInput(this,3)" onkeydown="codeKey(event,3)" />
      <input class="code-input" maxlength="1" id="c4" oninput="codeInput(this,4)" onkeydown="codeKey(event,4)" />
      <input class="code-input" maxlength="1" id="c5" oninput="codeInput(this,5)" onkeydown="codeKey(event,5)" />
    </div>
    <div class="login-error" id="verifyError"></div>
    <div class="login-success" id="verifySuccess"></div>
    <button class="login-btn" id="verifyBtn" onclick="verifyCode()">Verify & Join</button>
    <div class="resend-row">
      Didn't get it? <button class="resend-btn" id="resendBtn" onclick="resendCode()">Resend</button>
    </div>
    <button class="login-back" onclick="goBack()">← Use a different email</button>
  </div>
</div>

<!-- ── App ── -->
<div class="app" id="appUI" style="display:none">
  <div class="sidebar">
    <div class="sidebar-header"><h2># Channels</h2></div>
    <div class="channel-list" id="channelList"></div>
    <div class="sidebar-footer">
      <div class="user-row">
        <div class="avatar" id="myAvatar" style="background:#dbeafe;color:#1d4ed8">YO</div>
        <div>
          <div class="username" id="myNameDisplay">You</div>
          <div class="user-status"><span class="online-dot" style="width:6px;height:6px;margin-right:3px"></span>Online</div>
        </div>
        <button class="settings-btn" onclick="openSettings()">⚙</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="chat-header">
      <span style="font-size:16px;color:var(--text2)">#</span>
      <span class="chat-header-name" id="chatTitle">general</span>
      <span class="conn-status conn-online" id="connStatus">● live</span>
      <div class="header-call-btns">
        <button class="call-btn" id="voiceCallBtn" onclick="startCall('voice')" title="Voice call">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.01 1.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92z"/></svg>
          Voice
        </button>
        <button class="call-btn" id="videoCallBtn" onclick="startCall('video')" title="Video call">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          Video
        </button>
      </div>
      <span class="chat-header-desc" id="onlineCount"></span>
    </div>

    <div class="messages" id="messages"></div>
    <div style="padding:0 16px 2px"><div class="typing-indicator" id="typingIndicator"></div></div>

    <div class="input-area">
      <div class="input-row">
        <div style="position:relative">
          <button class="icon-btn" onclick="toggleEmojiPicker()">😊</button>
          <div class="emoji-picker" id="emojiPicker" style="display:none"></div>
        </div>
        <textarea class="chat-input" id="chatInput" placeholder="Message #general..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this);handleTyping()"></textarea>
        <button class="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <div class="members-panel" id="membersPanel"></div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2>⚙ Settings</h2>
    <div class="setting-group">
      <span class="setting-label">Theme</span>
      <div class="theme-grid">
        <button class="theme-btn active" onclick="setTheme('',this)">☀ Modern</button>
        <button class="theme-btn" onclick="setTheme('dark',this)">🌙 Dark</button>
        <button class="theme-btn" onclick="setTheme('discord',this)">💬 Discord</button>
        <button class="theme-btn" onclick="setTheme('gamer',this)">🎮 Gamer</button>
      </div>
    </div>
    <div class="setting-group">
      <span class="setting-label">Avatar color</span>
      <div class="color-swatches" id="colorSwatches"></div>
    </div>
    <button class="close-btn" onclick="closeSettings()">Done</button>
  </div>
</div>

<!-- Daily.co Call Modal -->
<div class="modal-overlay" id="callModal">
  <div class="call-modal">
    <div class="call-modal-header">
      <span id="callTypeIcon">📞</span>
      <h3 id="callModalTitle">Voice Call</h3>
      <span class="ch-label" id="callModalChannel">#general</span>
      <button class="end-call-btn" onclick="endCall()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        End Call
      </button>
    </div>
    <iframe id="dailyFrame" allow="camera; microphone; fullscreen; display-capture; autoplay" allowfullscreen></iframe>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

emailjs.init(EMAILJS_KEY);

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── State ─────────────────────────────────────────────────────────────────────
const channels    = ['general','random','tech-talk','off-topic'];
const avatarColors = [
  {bg:'#dbeafe',fg:'#1d4ed8'},{bg:'#dcfce7',fg:'#166534'},
  {bg:'#fce7f3',fg:'#9d174d'},{bg:'#fef9c3',fg:'#854d0e'},
  {bg:'#f3e8ff',fg:'#6b21a8'},{bg:'#ffe4e6',fg:'#9f1239'},
];
const emojis = ['👍','❤️','😂','😮','😢','🎉','🔥','✅','👏','🙌'];

let myName='', myEmail='', myBg='#dbeafe', myFg='#1d4ed8', selectedColorIdx=0;
let currentChannel='general', emojiOpen=false, typingTimer=null;
let userId='user_'+Math.random().toString(36).slice(2,9);
let onlineUsers={}, messageListeners={}, activeCall=null;
let verificationCode='', resendTimer=null, resendSeconds=60;

const getInitials = n => n.slice(0,2).toUpperCase();
function nowTime(){
  const d=new Date(),h=d.getHours()%12||12,m=d.getMinutes().toString().padStart(2,'0');
  return `${h}:${m} ${d.getHours()<12?'AM':'PM'}`;
}
function generateCode(){ return Math.floor(100000+Math.random()*900000).toString(); }

// ── EmailJS verification ──────────────────────────────────────────────────────
window.sendVerificationCode = async function() {
  const name  = document.getElementById('loginName').value.trim();
  const email = document.getElementById('loginEmail').value.trim();
  const errEl = document.getElementById('loginError');

  errEl.classList.remove('show');

  if (!name) { showLoginError('Please enter a nickname.'); return; }
  if (!email || !email.includes('@')) { showLoginError('Please enter a valid email.'); return; }

  const btn = document.getElementById('sendCodeBtn');
  btn.disabled = true;
  btn.textContent = 'Sending…';

  verificationCode = generateCode();
  myName  = name;
  myEmail = email;

  try {
    await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
      email: email,
      code:  verificationCode,
    });

    // Switch to verify screen
    document.getElementById('loginScreen').style.display  = 'none';
    document.getElementById('verifyScreen').style.display = 'flex';
    document.getElementById('verifyDesc').textContent = `We sent a 6-digit code to ${email}`;
    document.getElementById('c0').focus();
    startResendTimer();
  } catch(err) {
    showLoginError('Failed to send email. Please try again.');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send Code to Gmail';
  }
};

function showLoginError(msg){
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.classList.add('show');
}

window.resendCode = async function() {
  const btn = document.getElementById('resendBtn');
  btn.disabled = true;
  verificationCode = generateCode();
  try {
    await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
      email: myEmail,
      code:  verificationCode,
    });
    const s = document.getElementById('verifySuccess');
    s.textContent = 'New code sent!';
    s.classList.add('show');
    setTimeout(()=>s.classList.remove('show'), 3000);
    startResendTimer();
  } catch(err) {
    console.error(err);
  }
};

function startResendTimer(){
  clearInterval(resendTimer);
  resendSeconds = 60;
  const btn = document.getElementById('resendBtn');
  btn.disabled = true;
  btn.textContent = `Resend (${resendSeconds}s)`;
  resendTimer = setInterval(()=>{
    resendSeconds--;
    if(resendSeconds <= 0){
      clearInterval(resendTimer);
      btn.disabled = false;
      btn.textContent = 'Resend';
    } else {
      btn.textContent = `Resend (${resendSeconds}s)`;
    }
  }, 1000);
}

window.verifyCode = function() {
  const entered = [0,1,2,3,4,5].map(i=>document.getElementById('c'+i).value).join('');
  const errEl   = document.getElementById('verifyError');
  errEl.classList.remove('show');

  if(entered.length < 6){ errEl.textContent='Enter all 6 digits.'; errEl.classList.add('show'); return; }
  if(entered !== verificationCode){
    errEl.textContent='Incorrect code. Please try again.';
    errEl.classList.add('show');
    [0,1,2,3,4,5].forEach(i=>{ document.getElementById('c'+i).value=''; });
    document.getElementById('c0').focus();
    return;
  }

  // Verified — launch chat
  document.getElementById('verifyScreen').style.display='none';
  document.getElementById('appUI').style.display='flex';
  document.getElementById('myNameDisplay').textContent=myName;
  document.getElementById('myAvatar').textContent=getInitials(myName);
  document.getElementById('myAvatar').style.background=myBg;
  document.getElementById('myAvatar').style.color=myFg;
  startPresence(); renderChannels(); renderColorSwatches();
  listenToChannel(currentChannel); listenToOnlineUsers();
};

window.goBack = function(){
  document.getElementById('verifyScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  clearInterval(resendTimer);
};

// ── Code input UX (auto-advance, backspace) ───────────────────────────────────
window.codeInput = function(el, idx){
  el.value = el.value.replace(/\D/g,'').slice(-1);
  if(el.value && idx < 5) document.getElementById('c'+(idx+1)).focus();
  // Auto-verify when all filled
  const all = [0,1,2,3,4,5].map(i=>document.getElementById('c'+i).value).join('');
  if(all.length===6) verifyCode();
};
window.codeKey = function(e, idx){
  if(e.key==='Backspace' && !document.getElementById('c'+idx).value && idx>0)
    document.getElementById('c'+(idx-1)).focus();
};

// ── Login color swatches ──────────────────────────────────────────────────────
function renderLoginColors(){
  document.getElementById('loginColors').innerHTML = avatarColors.map((c,i)=>
    `<div style="width:26px;height:26px;border-radius:50%;background:${c.bg};border:2px solid ${i===0?c.fg:'transparent'};cursor:pointer" onclick="selectLoginColor(${i})"></div>`
  ).join('');
}
window.selectLoginColor = function(idx){
  selectedColorIdx=idx; myBg=avatarColors[idx].bg; myFg=avatarColors[idx].fg;
  document.querySelectorAll('#loginColors div').forEach((d,i)=>{
    d.style.borderColor = i===idx ? avatarColors[idx].fg : 'transparent';
  });
};

// ── Daily.co ──────────────────────────────────────────────────────────────────
window.startCall = function(type){
  const params = type==='voice' ? '?video=false' : '';
  document.getElementById('callTypeIcon').textContent   = type==='voice' ? '📞' : '📹';
  document.getElementById('callModalTitle').textContent = type==='voice' ? 'Voice Call' : 'Video Call';
  document.getElementById('callModalChannel').textContent = `#${currentChannel}`;
  document.getElementById('dailyFrame').src = `https://${DAILY_DOMAIN}/${currentChannel}${params}`;
  document.getElementById('callModal').classList.add('open');
  activeCall=type;
  document.getElementById('voiceCallBtn').classList.toggle('active',type==='voice');
  document.getElementById('videoCallBtn').classList.toggle('active',type==='video');
};
window.endCall = function(){
  document.getElementById('dailyFrame').src='';
  document.getElementById('callModal').classList.remove('open');
  document.getElementById('voiceCallBtn').classList.remove('active');
  document.getElementById('videoCallBtn').classList.remove('active');
  activeCall=null;
};

// ── Presence ──────────────────────────────────────────────────────────────────
function startPresence(){
  updatePresence();
  setInterval(updatePresence,15000);
  window.addEventListener('beforeunload',removePresence);
}
function updatePresence(){
  set(ref(db,`presence/${currentChannel}/${userId}`),{name:myName,bg:myBg,fg:myFg,ts:Date.now()});
}
function removePresence(){ remove(ref(db,`presence/${currentChannel}/${userId}`)); }
function listenToOnlineUsers(){
  onValue(ref(db,`presence/${currentChannel}`),snap=>{
    onlineUsers={};
    const now=Date.now();
    snap.forEach(child=>{ const d=child.val(); if(now-d.ts<30000) onlineUsers[child.key]=d; });
    renderMembers();
    document.getElementById('onlineCount').innerHTML=`<span class="online-dot"></span>${Object.keys(onlineUsers).length} online`;
  });
}

// ── Channels ──────────────────────────────────────────────────────────────────
function renderChannels(){
  document.getElementById('channelList').innerHTML=channels.map(c=>
    `<div class="channel ${c===currentChannel?'active':''}" onclick="window.switchChannel('${c}')">
      <span style="opacity:.7">#</span><span>${c}</span>
    </div>`).join('');
}
window.switchChannel=function(ch){
  removePresence(); currentChannel=ch;
  document.getElementById('chatTitle').textContent=ch;
  document.getElementById('chatInput').placeholder=`Message #${ch}...`;
  document.getElementById('messages').innerHTML='';
  renderChannels(); updatePresence(); listenToChannel(ch); listenToOnlineUsers();
};

// ── Messages ──────────────────────────────────────────────────────────────────
function listenToChannel(ch){
  if(messageListeners[ch]) return;
  messageListeners[ch]=true;
  onChildAdded(ref(db,`messages/${ch}`),snap=>{
    if(ch!==currentChannel) return;
    appendMessage(snap.val());
  });
}
function appendMessage(msg){
  const container=document.getElementById('messages');
  const isOut=msg.name===myName;
  const rows=container.querySelectorAll('.msg-row');
  const lastRow=rows[rows.length-1];
  const isCont=lastRow?lastRow.dataset.from===msg.name:false;
  const bg=isOut?myBg:(msg.bg||'#e5e7eb');
  const fg=isOut?myFg:(msg.fg||'#374151');
  const div=document.createElement('div');
  div.className='msg-group';
  div.innerHTML=`
    <div class="msg-row ${isOut?'out':''} ${isCont?'continuation':''}" data-from="${msg.name}">
      <div class="msg-avatar" style="background:${bg};color:${fg}">${getInitials(msg.name)}</div>
      <div class="msg-content">
        ${!isCont&&!isOut?`<div class="msg-sender">${msg.name}</div>`:''}
        <div class="bubble ${isOut?'out':'in'}">${escapeHtml(msg.text)}</div>
        <div class="msg-meta"><span class="msg-time">${msg.time}</span></div>
      </div>
    </div>`;
  container.appendChild(div);
  container.scrollTop=container.scrollHeight;
}
function escapeHtml(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

window.sendMessage=function(){
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text) return;
  push(ref(db,`messages/${currentChannel}`),{name:myName,text,time:nowTime(),bg:myBg,fg:myFg,ts:Date.now()});
  input.value=''; autoResize(input); clearTypingIndicator();
};

// ── Typing ────────────────────────────────────────────────────────────────────
window.handleTyping=function(){
  set(ref(db,`typing/${currentChannel}/${userId}`),{name:myName,ts:Date.now()});
  clearTimeout(typingTimer);
  typingTimer=setTimeout(clearTypingIndicator,2000);
};
function clearTypingIndicator(){ remove(ref(db,`typing/${currentChannel}/${userId}`)); }
setTimeout(()=>{
  onValue(ref(db,`typing/${currentChannel}`),snap=>{
    const typers=[],now=Date.now();
    snap.forEach(child=>{ const d=child.val(); if(child.key!==userId&&now-d.ts<3000) typers.push(d.name); });
    const el=document.getElementById('typingIndicator');
    if(typers.length){
      el.innerHTML=`<div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div><span>${typers.join(', ')} ${typers.length>1?'are':'is'} typing...</span>`;
    } else { el.innerHTML=''; }
  });
},500);

// ── Members ───────────────────────────────────────────────────────────────────
function renderMembers(){
  const users=Object.values(onlineUsers);
  document.getElementById('membersPanel').innerHTML=
    `<h3>Online — ${users.length}</h3>`+
    users.map(u=>`<div class="member-row">
      <div class="avatar" style="width:26px;height:26px;font-size:9px;background:${u.bg||'#dbeafe'};color:${u.fg||'#1d4ed8'}">${getInitials(u.name)}</div>
      <span class="member-name">${u.name}</span>
      <div class="member-dot"></div>
    </div>`).join('');
}

// ── Settings ──────────────────────────────────────────────────────────────────
window.openSettings=function(){ document.getElementById('settingsModal').classList.add('open'); };
window.closeSettings=function(){ document.getElementById('settingsModal').classList.remove('open'); updatePresence(); };
window.handleOverlayClick=function(e){ if(e.target===e.currentTarget) closeSettings(); };
window.setTheme=function(theme,btn){
  document.body.setAttribute('data-theme',theme);
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
};
window.setAvatarColor=function(idx){
  selectedColorIdx=idx; myBg=avatarColors[idx].bg; myFg=avatarColors[idx].fg;
  document.getElementById('myAvatar').style.background=myBg;
  document.getElementById('myAvatar').style.color=myFg;
  renderColorSwatches();
};
function renderColorSwatches(){
  document.getElementById('colorSwatches').innerHTML=avatarColors.map((c,i)=>
    `<div class="color-swatch" style="background:${c.bg};border-color:${i===selectedColorIdx?c.fg:'transparent'}" onclick="setAvatarColor(${i})"></div>`
  ).join('');
}

// ── Emoji ─────────────────────────────────────────────────────────────────────
window.toggleEmojiPicker=function(){
  emojiOpen=!emojiOpen;
  const p=document.getElementById('emojiPicker');
  if(emojiOpen){p.innerHTML=emojis.map(e=>`<span class="ep-emoji" onclick="insertEmoji('${e}')">${e}</span>`).join('');p.style.display='flex';}
  else p.style.display='none';
};
window.insertEmoji=function(e){
  const i=document.getElementById('chatInput');i.value+=e;i.focus();
  emojiOpen=false;document.getElementById('emojiPicker').style.display='none';
};
document.addEventListener('click',e=>{
  if(emojiOpen&&!e.target.closest('#emojiPicker')&&!e.target.closest('.icon-btn')){
    emojiOpen=false;document.getElementById('emojiPicker').style.display='none';
  }
});

window.handleKey=function(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} };
window.autoResize=function(el){ el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'; };

renderLoginColors();
</script>
</body>
</html>
