<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Chat App</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#ffffff;--bg2:#f8f8f6;--bg3:#f0efeb;
  --sidebar-bg:#f4f3f0;--text:#111;--text2:#555;--text3:#999;
  --border:#e6e5e0;--accent:#2563eb;--accent-light:#eff4ff;
  --bubble-out:#2563eb;--bubble-out-text:#fff;
  --bubble-in:#efefec;--bubble-in-text:#111;
  --input-bg:#f2f1ee;--font:'Geist',sans-serif;
  --radius:16px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}
[data-theme="dark"]{
  --bg:#18181b;--bg2:#1f1f23;--bg3:#27272b;
  --sidebar-bg:#101013;--text:#f4f4f5;--text2:#a1a1aa;--text3:#52525b;
  --border:#2f2f35;--accent:#4f8ef5;--accent-light:#1e2d4a;
  --bubble-out:#4f8ef5;--bubble-out-text:#fff;
  --bubble-in:#27272b;--bubble-in-text:#f4f4f5;--input-bg:#27272b;
}
[data-theme="discord"]{
  --bg:#313338;--bg2:#2b2d31;--bg3:#232428;
  --sidebar-bg:#2b2d31;--text:#dbdee1;--text2:#949ba4;--text3:#6d6f78;
  --border:#3a3c40;--accent:#5865f2;--accent-light:#2c2e45;
  --bubble-out:#5865f2;--bubble-out-text:#fff;
  --bubble-in:#383a40;--bubble-in-text:#dbdee1;--input-bg:#383a40;
}
[data-theme="amoled"]{
  --bg:#000;--bg2:#0a0a0a;--bg3:#111;
  --sidebar-bg:#000;--text:#fff;--text2:#888;--text3:#444;
  --border:#1a1a1a;--accent:#00d4ff;--accent-light:#001a22;
  --bubble-out:#00d4ff;--bubble-out-text:#000;
  --bubble-in:#111;--bubble-in-text:#fff;--input-bg:#0f0f0f;
}

html{height:100%;height:-webkit-fill-available}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  font-size:14px;transition:background .2s,color .2s;
  height:100%;height:-webkit-fill-available;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}

/* ── LOGIN ── */
.login-screen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  z-index:9999;padding:20px;
  padding-top:calc(20px + var(--safe-top));
  padding-bottom:calc(20px + var(--safe-bottom));
}
.login-box{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:22px;padding:32px 28px;width:100%;max-width:340px;
  display:flex;flex-direction:column;gap:16px;
  box-shadow:0 8px 40px rgba(0,0,0,.1);
}
.login-box h2{font-size:20px;font-weight:600}
.login-box p{font-size:13px;color:var(--text2);line-height:1.5}
.login-input{
  padding:13px 14px;border-radius:11px;border:1.5px solid var(--border);
  background:var(--input-bg);color:var(--text);font-family:var(--font);
  font-size:16px;outline:none;width:100%;transition:border-color .15s;
}
.login-input:focus{border-color:var(--accent)}
.login-btn{
  padding:13px;background:var(--accent);border:none;border-radius:11px;
  color:#fff;font-family:var(--font);font-size:15px;font-weight:500;
  cursor:pointer;width:100%;transition:opacity .12s;-webkit-appearance:none;
}
.login-btn:active{opacity:.8}
.color-row{display:flex;gap:10px;flex-wrap:wrap}
.color-dot{
  width:30px;height:30px;border-radius:50%;cursor:pointer;
  border:2.5px solid transparent;transition:border-color .12s,transform .12s;
}
.color-dot:active{transform:scale(1.15)}

/* ── APP SHELL ── */
.app{display:flex;height:100%;height:-webkit-fill-available;overflow:hidden;position:relative}

/* ── SIDEBAR ── */
.sidebar{
  width:224px;background:var(--sidebar-bg);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
  transition:transform .26s cubic-bezier(.4,0,.2,1);
  z-index:300;
}
.sidebar-header{
  padding:18px 14px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding-top:calc(18px + var(--safe-top));
}
.sidebar-header h2{
  font-size:11px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:var(--text3);
}
.sidebar-close{
  display:none;background:none;border:none;cursor:pointer;
  color:var(--text3);font-size:20px;padding:2px 6px;line-height:1;
  min-width:36px;min-height:36px;align-items:center;justify-content:center;
}
.channel-list{flex:1;overflow-y:auto;padding:6px 0;-webkit-overflow-scrolling:touch}
.channel{
  display:flex;align-items:center;gap:8px;
  padding:9px 12px;border-radius:8px;margin:1px 6px;
  cursor:pointer;color:var(--text2);font-size:13.5px;
  transition:background .12s,color .12s;user-select:none;min-height:44px;
}
.channel:hover{background:var(--bg3);color:var(--text)}
.channel.active{background:var(--accent-light);color:var(--accent);font-weight:500}
.channel-hash{opacity:.6;font-size:15px}
.unread-dot{margin-left:auto;width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
.sidebar-footer{
  padding:10px;border-top:1px solid var(--border);
  padding-bottom:calc(10px + var(--safe-bottom));
}
.user-row{display:flex;align-items:center;gap:9px}
.avatar{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;flex-shrink:0;font-family:'Geist Mono',monospace;
}
.username{font-size:13px;font-weight:500}
.user-status{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px}
.online-dot{width:6px;height:6px;border-radius:50%;background:#22c55e}
.settings-btn{
  margin-left:auto;background:none;border:none;cursor:pointer;
  color:var(--text3);padding:6px;border-radius:7px;
  font-size:17px;min-width:36px;min-height:36px;
  display:flex;align-items:center;justify-content:center;
}
.settings-btn:active{background:var(--bg3);color:var(--text)}

/* sidebar overlay */
.sidebar-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:299;opacity:0;transition:opacity .26s;
}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;overflow:hidden}

.chat-header{
  padding:12px 16px;
  padding-top:calc(12px + var(--safe-top));
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  background:var(--bg);flex-shrink:0;min-height:54px;
}
.hamburger{
  display:none;background:none;border:none;cursor:pointer;
  color:var(--text2);padding:4px;font-size:22px;
  min-width:38px;min-height:38px;align-items:center;justify-content:center;
  border-radius:8px;flex-shrink:0;
}
.hamburger:active{background:var(--bg3)}
.chat-header-name{font-weight:600;font-size:15px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conn-badge{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;flex-shrink:0}
.conn-online{background:#dcfce7;color:#166534}
.conn-offline{background:#fee2e2;color:#991b1b}
.online-count{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:4px;flex-shrink:0}

/* ── MESSAGES ── */
.messages{
  flex:1;overflow-y:auto;padding:12px 14px;
  display:flex;flex-direction:column;gap:2px;background:var(--bg);
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.empty-state{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:8px;color:var(--text3);padding:40px;
}
.empty-state .big{font-size:40px}
.empty-state p{font-size:13px;text-align:center;max-width:220px;line-height:1.5}
.day-divider{
  display:flex;align-items:center;gap:10px;
  margin:12px 0;color:var(--text3);font-size:11px;flex-shrink:0;
}
.day-divider::before,.day-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.msg-group{display:flex;flex-direction:column;gap:2px;margin:3px 0}
.msg-row{display:flex;align-items:flex-end;gap:7px;position:relative}
.msg-row.out{flex-direction:row-reverse}
.msg-avatar{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:600;flex-shrink:0;margin-bottom:2px;
  font-family:'Geist Mono',monospace;
}
.msg-row.continuation .msg-avatar{visibility:hidden}
.msg-content{display:flex;flex-direction:column;max-width:78%}
.msg-row.out .msg-content{align-items:flex-end}
.msg-sender{font-size:11px;color:var(--text3);margin-bottom:3px;padding-left:2px}
.bubble{
  padding:9px 13px;border-radius:var(--radius);
  font-size:13.5px;line-height:1.55;word-break:break-word;position:relative;
}
.bubble.in{background:var(--bubble-in);color:var(--bubble-in-text);border-bottom-left-radius:4px}
.bubble.out{background:var(--bubble-out);color:var(--bubble-out-text);border-bottom-right-radius:4px}
.msg-row.continuation .bubble.in{border-top-left-radius:4px}
.msg-row.continuation .bubble.out{border-top-right-radius:4px}
.msg-meta{display:flex;align-items:center;gap:6px;margin-top:3px;padding:0 2px}
.msg-time{font-size:10.5px;color:var(--text3)}

/* Reactions */
.reactions{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.reaction-chip{
  display:flex;align-items:center;gap:3px;
  background:var(--bg3);border:1.5px solid var(--border);
  border-radius:99px;padding:3px 9px;font-size:12px;
  cursor:pointer;transition:background .12s,border-color .12s;
  user-select:none;min-height:28px;
}
.reaction-chip:active{border-color:var(--accent);background:var(--accent-light)}
.reaction-chip.mine{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.reaction-count{font-size:11px;color:var(--text2);font-weight:500}
.react-btn{
  position:absolute;right:-6px;top:50%;transform:translateY(-50%);
  background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:3px 6px;font-size:13px;cursor:pointer;
  z-index:10;opacity:0;transition:opacity .12s;
}
.msg-row.out .react-btn{right:auto;left:-6px}
.msg-row:hover .react-btn{opacity:1}
.react-picker{
  position:absolute;top:-46px;right:0;z-index:100;
  background:var(--bg);border:1px solid var(--border);
  border-radius:13px;padding:7px 9px;display:flex;gap:4px;
  box-shadow:0 4px 24px rgba(0,0,0,.14);
}
.msg-row.out .react-picker{right:auto;left:0}
.rp-emoji{font-size:20px;cursor:pointer;padding:4px;border-radius:6px;min-width:34px;text-align:center}
.rp-emoji:active{background:var(--bg3)}

/* Scroll btn */
.scroll-btn{
  position:absolute;bottom:84px;right:16px;
  width:38px;height:38px;border-radius:50%;
  background:var(--accent);border:none;cursor:pointer;
  color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 14px rgba(0,0,0,.2);
  opacity:0;pointer-events:none;transition:opacity .2s;z-index:50;
}
.scroll-btn.visible{opacity:1;pointer-events:all}

/* ── BOTTOM AREA ── */
.bottom-area{flex-shrink:0;background:var(--bg);border-top:1px solid var(--border)}
.typing-bar{
  padding:4px 16px 0;min-height:20px;display:flex;align-items:center;
  gap:6px;font-size:12px;color:var(--text3);
}
.typing-dots{display:flex;gap:3px}
.typing-dot{
  width:5px;height:5px;border-radius:50%;background:var(--text3);
  animation:bounce 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

.input-area{
  padding:8px 12px;
  padding-bottom:calc(10px + var(--safe-bottom));
}
.input-row{
  display:flex;align-items:flex-end;gap:6px;
  background:var(--input-bg);border:1.5px solid var(--border);
  border-radius:var(--radius);padding:6px 8px;transition:border-color .15s;
}
.input-row:focus-within{border-color:var(--accent)}
.icon-btn{
  background:none;border:none;cursor:pointer;color:var(--text3);
  padding:5px 7px;border-radius:8px;font-size:18px;
  position:relative;flex-shrink:0;
  min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center;
}
.icon-btn:active{color:var(--accent);background:var(--accent-light)}
.chat-input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:var(--font);
  font-size:16px; /* prevents iOS zoom on focus */
  resize:none;min-height:24px;max-height:100px;line-height:1.5;padding:2px 4px;
}
.chat-input::placeholder{color:var(--text3)}
.send-btn{
  background:var(--accent);border:none;cursor:pointer;color:#fff;
  padding:7px 14px;border-radius:10px;font-size:14px;
  flex-shrink:0;font-family:var(--font);font-weight:500;min-height:36px;
  -webkit-appearance:none;transition:opacity .12s;
}
.send-btn:active{opacity:.8}

/* Emoji picker */
.emoji-picker{
  position:absolute;bottom:calc(100% + 6px);left:0;
  background:var(--bg);border:1px solid var(--border);
  border-radius:14px;padding:10px;display:flex;gap:5px;
  flex-wrap:wrap;width:230px;box-shadow:0 4px 24px rgba(0,0,0,.14);z-index:100;
}
.ep-emoji{font-size:22px;cursor:pointer;padding:5px;border-radius:8px;min-width:38px;text-align:center}
.ep-emoji:active{background:var(--bg3)}

/* ── MEMBERS PANEL ── */
.members-panel{
  width:176px;border-left:1px solid var(--border);
  background:var(--sidebar-bg);overflow-y:auto;flex-shrink:0;padding:14px 0;
}
.members-panel h3{
  font-size:10px;font-weight:600;letter-spacing:.09em;
  text-transform:uppercase;color:var(--text3);padding:0 12px 10px;
}
.member-row{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:7px;margin:1px 4px}
.member-name{font-size:12.5px;color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.member-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:999;opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--bg);border-radius:22px 22px 0 0;border:1px solid var(--border);
  padding:24px;width:100%;max-width:480px;
  transform:translateY(20px);transition:transform .2s;
  padding-bottom:calc(24px + var(--safe-bottom));
  box-shadow:0 -4px 40px rgba(0,0,0,.12);
}
.modal-overlay.open .modal{transform:translateY(0)}
.modal h2{font-size:16px;font-weight:600;margin-bottom:18px}
.setting-group{margin-bottom:18px}
.setting-label{
  font-size:11px;font-weight:600;color:var(--text3);
  margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;display:block;
}
.theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.theme-btn{
  padding:10px 12px;border-radius:11px;border:1.5px solid var(--border);
  background:var(--bg2);cursor:pointer;font-family:var(--font);
  font-size:13px;font-weight:500;color:var(--text2);
  transition:all .12s;text-align:left;min-height:44px;-webkit-appearance:none;
}
.theme-btn:active,.theme-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.close-btn{
  width:100%;padding:13px;background:var(--accent);border:none;
  border-radius:11px;color:#fff;font-family:var(--font);
  font-size:14px;font-weight:500;cursor:pointer;margin-top:8px;
  min-height:48px;-webkit-appearance:none;
}

/* Toast */
.toast{
  position:fixed;bottom:calc(80px + var(--safe-bottom));left:50%;
  transform:translateX(-50%) translateY(8px);
  background:var(--text);color:var(--bg);padding:8px 18px;border-radius:99px;
  font-size:12.5px;font-weight:500;opacity:0;pointer-events:none;
  transition:all .2s;z-index:9999;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── MOBILE BOTTOM CHANNEL NAV ── */
.mobile-nav{
  display:none;background:var(--sidebar-bg);
  border-top:1px solid var(--border);
  flex-shrink:0;
}
.mobile-nav-inner{
  display:flex;overflow-x:auto;gap:2px;
  padding:6px 8px;padding-bottom:calc(6px + var(--safe-bottom));
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.mobile-nav-inner::-webkit-scrollbar{display:none}
.mobile-tab{
  display:flex;flex-direction:column;align-items:center;
  padding:6px 14px;border-radius:10px;cursor:pointer;
  color:var(--text3);font-size:11px;gap:2px;white-space:nowrap;
  min-width:62px;flex-shrink:0;transition:background .12s,color .12s;
  position:relative;
}
.mobile-tab.active{color:var(--accent);background:var(--accent-light)}
.mobile-tab-hash{font-size:16px;line-height:1.2}
.mobile-unread{
  position:absolute;top:4px;right:10px;
  width:7px;height:7px;border-radius:50%;background:var(--accent);
}

/* ── RESPONSIVE ── */
@media (max-width:700px){
  /* Sidebar becomes slide-in drawer */
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;
    width:min(280px, 85vw);
    transform:translateX(-100%);
    box-shadow:4px 0 24px rgba(0,0,0,.14);
  }
  .sidebar.open{transform:translateX(0)}
  .sidebar-close{display:flex}
  .sidebar-overlay{display:block}
  .sidebar-overlay.open{opacity:1}

  /* Hamburger visible */
  .hamburger{display:flex}

  /* Hide desktop members panel */
  .members-panel{display:none}

  /* Show mobile bottom nav */
  .mobile-nav{display:block}

  /* Wider bubbles on small screens */
  .msg-content{max-width:86%}

  /* React btn always visible (no hover on touch) */
  .react-btn{opacity:1}

  /* Scroll btn above mobile nav */
  .scroll-btn{bottom:calc(70px + var(--safe-bottom) + 10px);right:12px}

  .toast{bottom:calc(75px + var(--safe-bottom))}
}

@media (min-width:701px){
  /* Desktop: modal is centered */
  .modal-overlay{align-items:center}
  .modal{border-radius:20px;max-width:360px;padding-bottom:24px}
}

@media (max-width:380px){
  .login-box{padding:24px 18px;border-radius:18px}
  .mobile-tab{min-width:54px;padding:6px 10px}
}
</style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>👋 Welcome to Chat</h2>
    <p>Pick a nickname and color to start chatting.</p>
    <input class="login-input" id="loginName" placeholder="Your nickname…"
      maxlength="20" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      onkeydown="if(event.key==='Enter')joinChat()"/>
    <div class="color-row" id="loginColors"></div>
    <button class="login-btn" onclick="joinChat()">Join Chat →</button>
  </div>
</div>

<!-- App -->
<div class="app" id="appUI" style="display:none">

  <!-- Sidebar backdrop (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- Sidebar / channel drawer -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2># Channels</h2>
      <button class="sidebar-close" onclick="closeSidebar()" aria-label="Close">✕</button>
    </div>
    <div class="channel-list" id="channelList"></div>
    <div class="sidebar-footer">
      <div class="user-row">
        <div class="avatar" id="myAvatar">YO</div>
        <div>
          <div class="username" id="myNameDisplay">You</div>
          <div class="user-status"><div class="online-dot"></div>Online</div>
        </div>
        <button class="settings-btn" onclick="openSettings()" aria-label="Settings">⚙</button>
      </div>
    </div>
  </div>

  <!-- Main chat area -->
  <div class="main">
    <div class="chat-header">
      <button class="hamburger" onclick="openSidebar()" aria-label="Open channels">☰</button>
      <span class="chat-header-name" id="chatTitle">general</span>
      <span class="conn-badge conn-online" id="connStatus">● live</span>
      <div class="online-count" id="onlineCount"></div>
    </div>

    <div class="messages" id="messages" onscroll="handleScroll()">
      <div class="empty-state" id="emptyState">
        <div class="big">💬</div>
        <p>Be the first to say something in #<span id="emptyChannel">general</span>!</p>
      </div>
    </div>

    <button class="scroll-btn" id="scrollBtn" onclick="scrollToBottom()" aria-label="Scroll to bottom">↓</button>

    <div class="bottom-area">
      <div class="typing-bar" id="typingBar"></div>
      <div class="input-area">
        <div class="input-row">
          <div style="position:relative">
            <button class="icon-btn" onclick="toggleEmojiPicker()" aria-label="Emoji">😊</button>
            <div class="emoji-picker" id="emojiPicker" style="display:none"></div>
          </div>
          <textarea class="chat-input" id="chatInput"
            placeholder="Message #general…" rows="1"
            onkeydown="handleKey(event)"
            oninput="autoResize(this);handleTyping()"></textarea>
          <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Members panel (desktop only) -->
  <div class="members-panel" id="membersPanel"></div>

  <!-- Mobile bottom channel nav -->
  <div class="mobile-nav" id="mobileNav">
    <div class="mobile-nav-inner" id="mobileNavInner"></div>
  </div>
</div>

<!-- Settings sheet -->
<div class="modal-overlay" id="settingsModal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2>⚙ Settings</h2>
    <div class="setting-group">
      <span class="setting-label">Theme</span>
      <div class="theme-grid">
        <button class="theme-btn active" onclick="setTheme('',this)">☀ Light</button>
        <button class="theme-btn" onclick="setTheme('dark',this)">🌙 Dark</button>
        <button class="theme-btn" onclick="setTheme('discord',this)">💬 Discord</button>
        <button class="theme-btn" onclick="setTheme('amoled',this)">🌌 AMOLED</button>
      </div>
    </div>
    <div class="setting-group">
      <span class="setting-label">Avatar color</span>
      <div class="color-row" id="colorSwatches"></div>
    </div>
    <div class="setting-group">
      <span class="setting-label">Sound</span>
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--text2);min-height:44px">
        <input type="checkbox" id="soundToggle" checked style="accent-color:var(--accent);width:18px;height:18px">
        Play sound on new messages
      </label>
    </div>
    <button class="close-btn" onclick="closeSettings()">Done</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getDatabase, ref, push, onChildAdded, onValue,
  set, remove, query, limitToLast
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ⚠️ Move to Vercel env vars in production
const firebaseConfig = {
  apiKey: "AIzaSyBROTXo_86kA1i29WyFBowDXwIKPC2Ddmw",
  authDomain: "chats-b0699.firebaseapp.com",
  databaseURL: "https://chats-b0699-default-rtdb.firebaseio.com",
  projectId: "chats-b0699",
  storageBucket: "chats-b0699.firebasestorage.app",
  messagingSenderId: "399848929770",
  appId: "1:399848929770:web:f8b5630dc2121737cdda93",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const CHANNELS   = ['general','random','tech-talk','off-topic'];
const AVATAR_COLORS = [
  {bg:'#dbeafe',fg:'#1d4ed8'},{bg:'#dcfce7',fg:'#166534'},
  {bg:'#fce7f3',fg:'#9d174d'},{bg:'#fef9c3',fg:'#854d0e'},
  {bg:'#f3e8ff',fg:'#6b21a8'},{bg:'#ffe4e6',fg:'#9f1239'},
  {bg:'#ccfbf1',fg:'#0f766e'},{bg:'#ffedd5',fg:'#c2410c'},
];
const EMOJIS      = ['👍','❤️','😂','🔥','😮','😢','🎉','✅','👏','🙌','💯','🤔'];
const QUICK_REACT = ['👍','❤️','😂','🔥','😮','🎉'];
const MSG_LIMIT   = 60;

let myName='', myBg=AVATAR_COLORS[0].bg, myFg=AVATAR_COLORS[0].fg;
let selectedColorIdx=0, currentChannel='general';
let emojiOpen=false, typingTimer=null;
let userId='u_'+Math.random().toString(36).slice(2,9);
let onlineUsers={}, channelListeners={}, unreadChannels=new Set();
let atBottom=true;

const getInitials = n => n.slice(0,2).toUpperCase();
const nowTime = () => {
  const d=new Date(),h=d.getHours()%12||12,m=d.getMinutes().toString().padStart(2,'0');
  return `${h}:${m} ${d.getHours()<12?'AM':'PM'}`;
};
const todayLabel = () => new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
const escapeHtml = t => t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const isMobile = () => window.innerWidth <= 700;

const showToast = msg => {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
};

// ── Sound ──
function playPing(){
  if(!document.getElementById('soundToggle')?.checked) return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.setValueAtTime(880,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(440,ctx.currentTime+0.1);
    g.gain.setValueAtTime(0.15,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
    o.start();o.stop(ctx.currentTime+0.3);
  }catch(e){}
}

// ── Sidebar (mobile drawer) ──
window.openSidebar = ()=>{
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('open');
};
window.closeSidebar = ()=>{
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
};

// ── Login ──
function renderLoginColors(){
  document.getElementById('loginColors').innerHTML=AVATAR_COLORS.map((c,i)=>
    `<div class="color-dot" style="background:${c.bg};border-color:${i===0?c.fg:'transparent'}"
      onclick="selectLoginColor(${i})"></div>`
  ).join('');
}
window.selectLoginColor=idx=>{
  selectedColorIdx=idx;myBg=AVATAR_COLORS[idx].bg;myFg=AVATAR_COLORS[idx].fg;
  document.querySelectorAll('#loginColors .color-dot').forEach((d,i)=>{
    d.style.borderColor=i===idx?AVATAR_COLORS[i].fg:'transparent';
  });
};
window.joinChat=()=>{
  const name=document.getElementById('loginName').value.trim();
  if(!name){document.getElementById('loginName').focus();return;}
  myName=name;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appUI').style.display='flex';
  document.getElementById('myNameDisplay').textContent=myName;
  document.getElementById('myAvatar').textContent=getInitials(myName);
  document.getElementById('myAvatar').style.background=myBg;
  document.getElementById('myAvatar').style.color=myFg;
  startPresence();
  renderChannels();renderMobileNav();renderColorSwatches();
  listenToChannel(currentChannel);
  listenToTyping(currentChannel);
  listenToOnlineUsers();
};

// ── Presence ──
function startPresence(){
  updatePresence();
  setInterval(updatePresence,15000);
  window.addEventListener('beforeunload',removePresence);
}
function updatePresence(){
  set(ref(db,`presence/${currentChannel}/${userId}`),{name:myName,bg:myBg,fg:myFg,ts:Date.now()});
}
function removePresence(){
  remove(ref(db,`presence/${currentChannel}/${userId}`));
}
function listenToOnlineUsers(){
  onValue(ref(db,`presence/${currentChannel}`),snap=>{
    onlineUsers={};const now=Date.now();
    snap.forEach(child=>{const d=child.val();if(now-d.ts<35000)onlineUsers[child.key]=d;});
    renderMembers();
    const count=Object.keys(onlineUsers).length;
    document.getElementById('onlineCount').innerHTML=`<div class="online-dot"></div>${count}`;
  });
}

// ── Channels ──
function renderChannels(){
  document.getElementById('channelList').innerHTML=CHANNELS.map(c=>
    `<div class="channel ${c===currentChannel?'active':''}" onclick="window.switchChannel('${c}')">
      <span class="channel-hash">#</span><span>${c}</span>
      ${unreadChannels.has(c)&&c!==currentChannel?'<div class="unread-dot"></div>':''}
    </div>`
  ).join('');
}
function renderMobileNav(){
  document.getElementById('mobileNavInner').innerHTML=CHANNELS.map(c=>
    `<div class="mobile-tab ${c===currentChannel?'active':''}" onclick="window.switchChannel('${c}')">
      ${unreadChannels.has(c)&&c!==currentChannel?'<div class="mobile-unread"></div>':''}
      <span class="mobile-tab-hash">#</span>
      <span>${c}</span>
    </div>`
  ).join('');
}
window.switchChannel=ch=>{
  if(ch===currentChannel){closeSidebar();return;}
  removePresence();clearTypingIndicator();
  currentChannel=ch;
  document.getElementById('chatTitle').textContent=ch;
  document.getElementById('chatInput').placeholder=`Message #${ch}…`;
  document.getElementById('messages').innerHTML=`<div class="empty-state" id="emptyState">
    <div class="big">💬</div><p>Be the first to say something in #<span>${ch}</span>!</p>
  </div>`;
  unreadChannels.delete(ch);
  renderChannels();renderMobileNav();closeSidebar();
  updatePresence();
  channelListeners[ch]=false;
  listenToChannel(ch);listenToTyping(ch);listenToOnlineUsers();
  atBottom=true;
};

// ── Messages ──
function listenToChannel(ch){
  if(channelListeners[ch])return;
  channelListeners[ch]=true;
  const msgsQ=query(ref(db,`messages/${ch}`),limitToLast(MSG_LIMIT));
  let init=true;
  onChildAdded(msgsQ,snap=>{
    const msg=snap.val();msg._id=snap.key;
    if(ch!==currentChannel){
      if(!init){unreadChannels.add(ch);renderChannels();renderMobileNav();}
      return;
    }
    document.getElementById('emptyState')?.remove();
    appendMessage(msg,ch);
    if(!init){if(msg.name!==myName)playPing();if(atBottom)scrollToBottom();}
  });
  setTimeout(()=>{init=false;scrollToBottom();},600);
}

function appendMessage(msg,ch){
  const container=document.getElementById('messages');
  const isOut=msg.name===myName;
  const rows=container.querySelectorAll('.msg-row');
  const lastRow=rows[rows.length-1];
  const lastFrom=lastRow?lastRow.dataset.from:'';
  const lastDate=lastRow?lastRow.dataset.date:'';
  const todayStr=new Date().toDateString();
  const isCont=lastFrom===msg.name;
  if(lastDate!==todayStr){
    const div=document.createElement('div');
    div.className='day-divider';div.textContent=todayLabel();
    container.appendChild(div);
  }
  const bg=isOut?myBg:(msg.bg||'#e5e7eb');
  const fg=isOut?myFg:(msg.fg||'#374151');
  const wrap=document.createElement('div');
  wrap.className='msg-group';wrap.dataset.msgId=msg._id||'';
  const reactHtml=buildReactionsHtml(msg.reactions||{},msg._id);
  wrap.innerHTML=`
    <div class="msg-row ${isOut?'out':''} ${isCont?'continuation':''}" data-from="${escapeHtml(msg.name)}" data-date="${todayStr}">
      <div class="msg-avatar" style="background:${bg};color:${fg}">${getInitials(msg.name)}</div>
      <div class="msg-content">
        ${!isCont&&!isOut?`<div class="msg-sender">${escapeHtml(msg.name)}</div>`:''}
        <div class="bubble ${isOut?'out':'in'}" title="${msg.time}">${escapeHtml(msg.text)}</div>
        <div class="reactions" id="reacts-${msg._id}">${reactHtml}</div>
        <div class="msg-meta"><span class="msg-time">${msg.time}</span></div>
      </div>
      <button class="react-btn" onclick="toggleReactPicker(event,'${msg._id}','${ch}')">😊</button>
    </div>`;
  container.appendChild(wrap);
}

function buildReactionsHtml(reacts,msgId){
  if(!reacts||!msgId)return'';
  const counts={},myReacts=new Set();
  Object.entries(reacts).forEach(([uid,emoji])=>{
    counts[emoji]=(counts[emoji]||0)+1;if(uid===userId)myReacts.add(emoji);
  });
  return Object.entries(counts).map(([emoji,count])=>
    `<span class="reaction-chip ${myReacts.has(emoji)?'mine':''}"
      onclick="toggleReaction('${msgId}','${escapeHtml(emoji)}',this)">${emoji} <span class="reaction-count">${count}</span></span>`
  ).join('');
}

// ── Reactions ──
window.toggleReactPicker=(e,msgId,ch)=>{
  e.stopPropagation();
  document.querySelectorAll('.react-picker').forEach(p=>p.remove());
  const btn=e.currentTarget;
  const picker=document.createElement('div');
  picker.className='react-picker';
  picker.innerHTML=QUICK_REACT.map(emoji=>
    `<span class="rp-emoji" onclick="pickReaction('${msgId}','${escapeHtml(emoji)}','${ch}')">${emoji}</span>`
  ).join('');
  btn.parentElement.appendChild(picker);
  setTimeout(()=>document.addEventListener('click',()=>picker.remove(),{once:true}),10);
};
window.pickReaction=(msgId,emoji,ch)=>{
  document.querySelectorAll('.react-picker').forEach(p=>p.remove());
  toggleReaction(msgId,emoji,null,ch);
};
window.toggleReaction=async(msgId,emoji,el,ch=currentChannel)=>{
  const path=`messages/${ch}/${msgId}/reactions/${userId}`;
  const snap=await new Promise(res=>onValue(ref(db,path),res,{onlyOnce:true}));
  const cur=snap.val();
  if(cur===emoji)remove(ref(db,path));else set(ref(db,path),emoji);
  onValue(ref(db,`messages/${ch}/${msgId}/reactions`),snap=>{
    const el=document.getElementById(`reacts-${msgId}`);
    if(el)el.innerHTML=buildReactionsHtml(snap.val()||{},msgId);
  },{onlyOnce:true});
};

// ── Send ──
window.sendMessage=()=>{
  const input=document.getElementById('chatInput');
  const text=input.value.trim();if(!text)return;
  push(ref(db,`messages/${currentChannel}`),{
    name:myName,text,time:nowTime(),bg:myBg,fg:myFg,ts:Date.now()
  });
  input.value='';autoResize(input);clearTypingIndicator();scrollToBottom();
};

// ── Typing ──
function listenToTyping(ch){
  onValue(ref(db,`typing/${ch}`),snap=>{
    const typers=[],now=Date.now();
    snap.forEach(child=>{
      const d=child.val();
      if(child.key!==userId&&now-d.ts<3500)typers.push(d.name);
    });
    const el=document.getElementById('typingBar');
    if(typers.length){
      el.innerHTML=`<div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div><span>${typers.join(', ')} ${typers.length>1?'are':'is'} typing…</span>`;
    }else el.innerHTML='';
  });
}
window.handleTyping=()=>{
  set(ref(db,`typing/${currentChannel}/${userId}`),{name:myName,ts:Date.now()});
  clearTimeout(typingTimer);typingTimer=setTimeout(clearTypingIndicator,2000);
};
function clearTypingIndicator(){
  if(myName)remove(ref(db,`typing/${currentChannel}/${userId}`));
}

// ── Members ──
function renderMembers(){
  const users=Object.values(onlineUsers);
  document.getElementById('membersPanel').innerHTML=
    `<h3>Online — ${users.length}</h3>`+
    users.map(u=>`<div class="member-row">
      <div class="avatar" style="width:26px;height:26px;font-size:9px;background:${u.bg||'#dbeafe'};color:${u.fg||'#1d4ed8'}">${getInitials(u.name)}</div>
      <span class="member-name">${escapeHtml(u.name)}</span>
      <div class="member-dot"></div>
    </div>`).join('');
}

// ── Scroll ──
window.handleScroll=()=>{
  const el=document.getElementById('messages');
  atBottom=el.scrollHeight-el.scrollTop-el.clientHeight<60;
  document.getElementById('scrollBtn').classList.toggle('visible',!atBottom);
};
window.scrollToBottom=()=>{
  const el=document.getElementById('messages');
  el.scrollTop=el.scrollHeight;atBottom=true;
  document.getElementById('scrollBtn').classList.remove('visible');
};

// ── Settings ──
window.openSettings=()=>document.getElementById('settingsModal').classList.add('open');
window.closeSettings=()=>{
  document.getElementById('settingsModal').classList.remove('open');updatePresence();
};
window.handleOverlayClick=e=>{if(e.target===e.currentTarget)closeSettings();};
window.setTheme=(theme,btn)=>{
  document.body.setAttribute('data-theme',theme);
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');localStorage.setItem('chat-theme',theme);
};
window.setAvatarColor=idx=>{
  selectedColorIdx=idx;myBg=AVATAR_COLORS[idx].bg;myFg=AVATAR_COLORS[idx].fg;
  document.getElementById('myAvatar').style.background=myBg;
  document.getElementById('myAvatar').style.color=myFg;
  renderColorSwatches();updatePresence();
};
function renderColorSwatches(){
  document.getElementById('colorSwatches').innerHTML=AVATAR_COLORS.map((c,i)=>
    `<div class="color-dot" style="background:${c.bg};border-color:${i===selectedColorIdx?c.fg:'transparent'}"
      onclick="setAvatarColor(${i})"></div>`
  ).join('');
}

// ── Emoji ──
window.toggleEmojiPicker=()=>{
  emojiOpen=!emojiOpen;
  const p=document.getElementById('emojiPicker');
  if(emojiOpen){
    p.innerHTML=EMOJIS.map(e=>`<span class="ep-emoji" onclick="insertEmoji('${e}')">${e}</span>`).join('');
    p.style.display='flex';
  }else p.style.display='none';
};
window.insertEmoji=e=>{
  const i=document.getElementById('chatInput');i.value+=e;i.focus();
  emojiOpen=false;document.getElementById('emojiPicker').style.display='none';
};
document.addEventListener('click',e=>{
  if(emojiOpen&&!e.target.closest('#emojiPicker')&&!e.target.closest('.icon-btn')){
    emojiOpen=false;document.getElementById('emojiPicker').style.display='none';
  }
});

// ── Input ──
window.handleKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}};
window.autoResize=el=>{el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';};

// iOS keyboard: keep scroll at bottom when keyboard opens
if(/iPhone|iPad|iPod/i.test(navigator.userAgent)){
  window.visualViewport?.addEventListener('resize',()=>{
    if(atBottom)setTimeout(scrollToBottom,50);
  });
}

// ── Init ──
const savedTheme=localStorage.getItem('chat-theme')||'';
document.body.setAttribute('data-theme',savedTheme);
document.querySelectorAll('.theme-btn').forEach(btn=>{
  btn.classList.toggle('active',btn.getAttribute('onclick').includes(`'${savedTheme}'`));
});
renderLoginColors();
</script>
</body>
</html>
